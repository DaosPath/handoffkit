name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # P0: Ruff must pass before tests (blocks merge / release readiness)
      - name: Run Ruff (blocking)
        run: ruff check --no-cache .

      - name: Run tests
        run: pytest -q

      - name: Tools + validation coverage gate
        # Mandatory coverage for sandbox / shell / tool execution / validation (P0)
        # (excludes medical/text helpers until those modules are split/refactored in P1)
        run: >
          pytest -q
          tests/test_tool_execution.py
          tests/test_shell_safety.py
          tests/test_sandbox_policy.py
          tests/test_validation.py
          tests/test_contract_validation.py
          --cov=handoffkit.tools.shell
          --cov=handoffkit.tools.filesystem
          --cov=handoffkit.tool_execution
          --cov=handoffkit.safety
          --cov=handoffkit.sandbox
          --cov=handoffkit.validation
          --cov-report=term-missing
          --cov-fail-under=80

      - name: Build package
        run: python -m build

      - name: Install twine
        run: python -m pip install twine

      - name: Check package metadata
        run: twine check dist/*

  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Check JavaScript package
        run: pnpm js:check

      - name: Test JavaScript package
        run: pnpm js:test

      - name: Lint web app
        run: pnpm web:lint

      - name: Typecheck web app
        run: pnpm --dir apps/web exec tsc --noEmit

      - name: Studio unit tests (parse-rankings)
        run: pnpm --dir apps/web run test:studio

      - name: Build web app
        run: pnpm web:build

  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Rust package
        run: cargo test --manifest-path packages/rust/Cargo.toml

  cpp:
    name: C++
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure C++ package
        run: cmake -S packages/cpp -B packages/cpp/build

      - name: Build C++ package
        run: cmake --build packages/cpp/build --config Release

      - name: Test C++ package
        run: ctest --test-dir packages/cpp/build -C Release --output-on-failure
