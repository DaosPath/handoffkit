name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Run lint
        run: ruff check .

      - name: Build package
        run: python -m build

      - name: Install twine
        run: python -m pip install twine

      - name: Check package metadata
        run: twine check dist/*

  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Check JavaScript package
        run: pnpm js:check

      - name: Test JavaScript package
        run: pnpm js:test

      - name: Lint web app
        run: pnpm web:lint

      - name: Build web app
        run: pnpm web:build

  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Rust package
        run: cargo test --manifest-path packages/rust/Cargo.toml

  cpp:
    name: C++
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure C++ package
        run: cmake -S packages/cpp -B packages/cpp/build

      - name: Build C++ package
        run: cmake --build packages/cpp/build --config Release

      - name: Test C++ package
        run: ctest --test-dir packages/cpp/build -C Release --output-on-failure
