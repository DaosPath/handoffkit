name: Publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: Publication target
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - npm
      release_version:
        description: Version to retry for npm, for example 1.14.2
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # P0: never publish if lint or core tests fail
  quality-gate:
    name: Ruff + tests (release gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff (blocking)
        run: ruff check --no-cache .

      - name: Run tests
        run: pytest -q

      - name: Tools + validation coverage gate
        run: >
          pytest -q
          tests/test_tool_execution.py
          tests/test_shell_safety.py
          tests/test_sandbox_policy.py
          tests/test_validation.py
          tests/test_contract_validation.py
          --cov=handoffkit.tools.shell
          --cov=handoffkit.tools.filesystem
          --cov=handoffkit.tool_execution
          --cov=handoffkit.safety
          --cov=handoffkit.sandbox
          --cov=handoffkit.validation
          --cov-report=term-missing
          --cov-fail-under=80

  build:
    name: Build distributions
    needs: quality-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/python/dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    environment:
      name: handoffkit
      url: https://test.pypi.org/project/handoffkit/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build, quality-gate-js, quality-gate-cpp]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    environment:
      name: pypi
      url: https://pypi.org/project/handoffkit/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  quality-gate-js:
    name: pnpm workspace + tests + tarballs (release gate)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace, tests, types, web, and tarballs
        run: pnpm ci:js

  publish-npm:
    name: Publish npm / ${{ matrix.package }}
    needs: [quality-gate, quality-gate-js, quality-gate-cpp]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.target == 'npm')
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: "@handoffkit/core"
            directory: packages/js/core
            archive: handoffkit-core
          - package: "@handoffkit/providers"
            directory: packages/js/providers
            archive: handoffkit-providers
          - package: "@handoffkit/templates"
            directory: packages/js/templates
            archive: handoffkit-templates
          - package: "@handoffkit/recipes"
            directory: packages/js/recipes
            archive: handoffkit-recipes
          - package: "@handoffkit/node"
            directory: packages/js/node
            archive: handoffkit-node
          - package: "@handoffkit/cli"
            directory: packages/js/cli
            archive: handoffkit-cli
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install OIDC-capable npm CLI
        run: npm install --global "npm@^11.5.1"

      - name: Resolve and validate release version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.release_version }}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "release_version is required for an npm workflow_dispatch retry" >&2
            exit 1
          fi
          PACKAGE_VERSION=$(node -p "require('./${{ matrix.directory }}/package.json').version")
          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "${{ matrix.package }} is $PACKAGE_VERSION, expected $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether the version already exists
        id: exists
        shell: bash
        run: |
          if npm view "${{ matrix.package }}@${{ steps.version.outputs.version }}" version --json >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ matrix.package }}@${{ steps.version.outputs.version }} already exists; skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack workspace with pnpm
        if: steps.exists.outputs.exists != 'true'
        run: |
          mkdir -p dist/npm
          pnpm --dir "${{ matrix.directory }}" pack --pack-destination "$GITHUB_WORKSPACE/dist/npm"

      - name: Publish with Trusted Publishing
        if: steps.exists.outputs.exists != 'true'
        run: >-
          npm publish
          "dist/npm/${{ matrix.archive }}-${{ steps.version.outputs.version }}.tgz"
          --access public

  quality-gate-cpp:
    name: C++ cmake + ctest (release gate)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure C++ package
        run: cmake -S packages/cpp -B packages/cpp/build -DCMAKE_BUILD_TYPE=Release -DHANDOFFKIT_WITH_HTTP=OFF

      - name: Build C++ package
        run: cmake --build packages/cpp/build --config Release

      - name: Test C++ package
        run: ctest --test-dir packages/cpp/build -C Release --output-on-failure

  build-cpp-release-asset:
    name: Build C++ source tarball
    needs: [quality-gate, quality-gate-js, quality-gate-cpp]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure packaging build
        run: >
          cmake -S packages/cpp -B packages/cpp/build-package
          -DCMAKE_BUILD_TYPE=Release
          -DHANDOFFKIT_BUILD_TESTS=OFF
          -DHANDOFFKIT_BUILD_EXAMPLES=OFF

      - name: Create source tarball
        run: cmake --build packages/cpp/build-package --target package_source_tarball --config Release

      - name: Resolve version
        id: ver
        run: |
          VER=$(grep -E '^project\(handoffkit VERSION' packages/cpp/CMakeLists.txt | sed -E 's/.*VERSION ([0-9.]+).*/\1/')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          ls -la packages/cpp/build-package/handoffkit-cpp-*.tar.gz packages/cpp/build-package/SHA256SUMS

      - name: Upload C++ release assets (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: handoffkit-cpp-release
          path: |
            packages/cpp/build-package/handoffkit-cpp-*.tar.gz
            packages/cpp/build-package/SHA256SUMS

  publish-cpp-release-assets:
    name: Attach C++ assets + OIDC attestation
    needs: build-cpp-release-asset
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    environment:
      name: cpp-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download C++ assets
        uses: actions/download-artifact@v4
        with:
          name: handoffkit-cpp-release
          path: cpp-assets

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: |
            cpp-assets/handoffkit-cpp-*.tar.gz
            cpp-assets/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance (OIDC)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            cpp-assets/handoffkit-cpp-*.tar.gz
