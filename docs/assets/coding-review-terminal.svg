<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit coding review in five minutes</title>
  <desc id="desc">A terminal-driven coding review demo comparing a vague summary with a structured HandoffState.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060913"/>
      <stop offset="0.55" stop-color="#0a1120"/>
      <stop offset="1" stop-color="#09170f"/>
    </linearGradient>
    <linearGradient id="accent" x1="68" y1="0" x2="1212" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.34" stop-color="#4ade80"/>
      <stop offset="0.68" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#21304a" stroke-opacity="0.28"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="134%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="640" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="30" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="1277" height="637" rx="28.5" fill="none" stroke="#22304a" stroke-width="3"/>

  <rect x="68" y="46" width="132" height="30" rx="15" fill="#0d2234" stroke="#155e75"/>
  <text x="88" y="66" class="mono" font-size="10" font-weight="800" fill="#7dd3fc">5-MINUTE DEMO</text>
  <text x="68" y="116" class="sans" font-size="40" font-weight="850" fill="#f8fafc">Inspect the exact handoff</text>
  <text x="68" y="146" class="sans" font-size="15" fill="#8fa4c0">Run one workflow, compare the handoff, then inspect its trace and report.</text>
  <rect x="68" y="166" width="1144" height="4" rx="2" fill="url(#accent)"/>

  <g transform="translate(722 42)" filter="url(#shadow)">
    <rect width="490" height="118" rx="18" fill="#050a13" stroke="#22304a"/>
    <rect width="490" height="34" rx="18" fill="#0a101c"/>
    <rect y="17" width="490" height="17" fill="#0a101c"/>
    <circle cx="22" cy="17" r="5" fill="#fb7185"/>
    <circle cx="40" cy="17" r="5" fill="#facc15"/>
    <circle cx="58" cy="17" r="5" fill="#4ade80"/>
    <text x="80" y="21" class="mono" font-size="9" fill="#64748b">coding-review</text>
    <text x="22" y="64" class="mono" font-size="12" font-weight="700" fill="#38bdf8">$ pip install handoffkit</text>
    <text x="22" y="88" class="mono" font-size="12" font-weight="700" fill="#e2e8f0">$ handoffkit showcase coding-review</text>
    <text x="22" y="108" class="mono" font-size="10" fill="#4ade80">✓ report written to runs/latest</text>
  </g>

  <g transform="translate(68 204)" filter="url(#shadow)">
    <rect width="408" height="366" rx="22" fill="#161018" stroke="#6b2639" stroke-width="1.5"/>
    <rect width="408" height="6" rx="3" fill="#fb7185"/>
    <rect x="24" y="24" width="82" height="28" rx="14" fill="#3a1420"/>
    <text x="42" y="43" class="mono" font-size="10" font-weight="800" fill="#fda4af">BEFORE</text>
    <text x="24" y="88" class="sans" font-size="22" font-weight="800" fill="#fecdd3">Before: vague summary</text>

    <rect x="24" y="106" width="360" height="112" rx="16" fill="#100b11" stroke="#4b1c2a"/>
    <text x="44" y="142" class="sans" font-size="15" fill="#e2e8f0">“Basically done.</text>
    <text x="44" y="168" class="sans" font-size="15" fill="#e2e8f0">Reviewer found an issue.</text>
    <text x="44" y="194" class="sans" font-size="15" fill="#e2e8f0">Tester should run it.”</text>

    <text x="24" y="250" class="sans" font-size="13" fill="#a98b96">Everything important is implicit.</text>
    <g transform="translate(24 270)">
      <rect width="94" height="30" rx="15" fill="#32111b"/>
      <text x="18" y="20" class="mono" font-size="10" font-weight="700" fill="#fda4af">no files</text>
      <rect x="104" width="114" height="30" rx="15" fill="#32111b"/>
      <text x="122" y="20" class="mono" font-size="10" font-weight="700" fill="#fda4af">no decisions</text>
      <rect x="228" width="104" height="30" rx="15" fill="#32111b"/>
      <text x="246" y="20" class="mono" font-size="10" font-weight="700" fill="#fda4af">no evidence</text>
    </g>
    <text x="24" y="334" class="mono" font-size="11" fill="#7f5f6a">next agent = reconstruction + guessing</text>
  </g>

  <g transform="translate(500 342)">
    <circle cx="42" cy="42" r="42" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <path d="M23 42H55" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
    <path d="M47 31L59 42L47 53" fill="none" stroke="#f8fafc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="2" y="104" class="mono" font-size="10" font-weight="700" fill="#64748b">BECOMES</text>
  </g>

  <g transform="translate(608 204)" filter="url(#shadow)">
    <rect width="604" height="366" rx="22" fill="#0b1714" stroke="#1f6a4b" stroke-width="1.5"/>
    <rect width="604" height="6" rx="3" fill="url(#accent)"/>
    <rect x="24" y="24" width="74" height="28" rx="14" fill="#0b2b1c"/>
    <text x="42" y="43" class="mono" font-size="10" font-weight="800" fill="#86efac">AFTER</text>
    <text x="24" y="88" class="sans" font-size="22" font-weight="800" fill="#dcfce7">After: HandoffState</text>
    <text x="24" y="112" class="sans" font-size="13" fill="#8fa4c0">The handoff is data that can be validated and replayed.</text>

    <g transform="translate(24 134)">
      <rect width="270" height="66" rx="15" fill="#07100e" stroke="#1b3d30"/>
      <circle cx="22" cy="22" r="5" fill="#60a5fa"/>
      <text x="36" y="25" class="sans" font-size="12" font-weight="700" fill="#e2e8f0">decisions</text>
      <text x="22" y="49" class="mono" font-size="10" fill="#93c5fd">argparse · pure functions</text>

      <rect x="286" width="270" height="66" rx="15" fill="#07100e" stroke="#1b3d30"/>
      <circle cx="308" cy="22" r="5" fill="#4ade80"/>
      <text x="322" y="25" class="sans" font-size="12" font-weight="700" fill="#e2e8f0">important_files</text>
      <text x="308" y="49" class="mono" font-size="10" fill="#86efac">calculator.py · tests.py</text>

      <rect y="82" width="270" height="66" rx="15" fill="#07100e" stroke="#1b3d30"/>
      <circle cx="22" cy="104" r="5" fill="#fb7185"/>
      <text x="36" y="107" class="sans" font-size="12" font-weight="700" fill="#e2e8f0">errors</text>
      <text x="22" y="131" class="mono" font-size="10" fill="#fda4af">none after review fix</text>

      <rect x="286" y="82" width="270" height="66" rx="15" fill="#07100e" stroke="#1b3d30"/>
      <circle cx="308" cy="104" r="5" fill="#fb923c"/>
      <text x="322" y="107" class="sans" font-size="12" font-weight="700" fill="#e2e8f0">next_steps</text>
      <text x="308" y="131" class="mono" font-size="10" fill="#fdba74">pytest -q · coverage</text>
    </g>

    <g transform="translate(24 306)">
      <rect width="150" height="34" rx="17" fill="#0b2b1c" stroke="#166534"/>
      <text x="20" y="22" class="mono" font-size="10" font-weight="800" fill="#86efac">validation passed</text>
      <rect x="162" width="138" height="34" rx="17" fill="#0d2234" stroke="#155e75"/>
      <text x="182" y="22" class="mono" font-size="10" font-weight="800" fill="#7dd3fc">quality A / 1.0</text>
      <rect x="312" width="244" height="34" rx="17" fill="#22143d" stroke="#7c3aed"/>
      <text x="332" y="22" class="mono" font-size="10" font-weight="800" fill="#c4b5fd">4 steps · 3 handoffs · replay ready</text>
    </g>
  </g>
</svg>
