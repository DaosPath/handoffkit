<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit coding-review terminal demo</title>
  <desc id="desc">A polished terminal walkthrough showing pip install handoffkit, the coding-review demo, and the difference between a vague summary and structured HandoffState.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111f"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#10231f"/>
    </linearGradient>
    <linearGradient id="rail" x1="96" y1="0" x2="1184" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.45" stop-color="#34d399"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="terminalTop" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="elevate" x="-8%" y="-10%" width="116%" height="125%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .h1 { fill: #f8fafc; font-size: 44px; font-weight: 820; letter-spacing: 0; }
      .lead { fill: #cbd5e1; font-size: 20px; font-weight: 520; letter-spacing: 0; }
      .label { fill: #94a3b8; font-size: 13px; font-weight: 760; letter-spacing: 0; }
      .body { fill: #e5e7eb; font-size: 18px; font-weight: 520; letter-spacing: 0; }
      .small { fill: #94a3b8; font-size: 14px; font-weight: 520; letter-spacing: 0; }
      .cmd { fill: #7dd3fc; font-size: 18px; font-weight: 740; letter-spacing: 0; }
      .ok { fill: #86efac; }
      .warn { fill: #fbbf24; }
      .bad { fill: #fca5a5; }
      .panel { fill: #0f172a; stroke: #273449; stroke-width: 1.2; }
      .soft { fill: #111827; stroke: #273449; stroke-width: 1; }
      .line { opacity: 0; animation: reveal 12s infinite ease-out; }
      .l1 { animation-delay: .2s; }
      .l2 { animation-delay: 1.1s; }
      .l3 { animation-delay: 2.0s; }
      .l4 { animation-delay: 2.9s; }
      .l5 { animation-delay: 3.8s; }
      .l6 { animation-delay: 4.8s; }
      .l7 { animation-delay: 5.8s; }
      .l8 { animation-delay: 6.8s; }
      .scan { animation: scan 12s infinite ease-in-out; }
      @keyframes reveal {
        0%, 4% { opacity: 0; transform: translateY(7px); }
        9%, 86% { opacity: 1; transform: translateY(0); }
        94%, 100% { opacity: 0; transform: translateY(0); }
      }
      @keyframes scan {
        0%, 33% { transform: translateX(0); opacity: .18; }
        44%, 76% { transform: translateX(520px); opacity: .42; }
        100% { transform: translateX(900px); opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .line { opacity: 1; animation: none; }
        .scan { animation: none; opacity: .16; }
      }
    </style>
  </defs>

  <rect width="1280" height="760" rx="36" fill="url(#surface)"/>
  <path d="M96 142H1184" stroke="url(#rail)" stroke-width="8" stroke-linecap="round"/>
  <path d="M96 614H1184" stroke="#223047" stroke-width="1"/>

  <g transform="translate(96 62)">
    <rect width="134" height="34" rx="17" fill="#082f49" stroke="#075985"/>
    <text x="18" y="23" class="mono label" fill="#bae6fd">DEMO VIDEO</text>
    <text x="0" y="88" class="sans h1">From context soup to contract handoffs</text>
    <text x="0" y="123" class="sans lead">One command flow. Visible before/after. Report evidence attached to the work.</text>
  </g>

  <g transform="translate(96 178)" filter="url(#elevate)">
    <rect width="1088" height="282" rx="22" class="panel"/>
    <rect width="1088" height="48" rx="22" fill="url(#terminalTop)"/>
    <path d="M0 48H1088" stroke="#273449"/>
    <circle cx="28" cy="24" r="7" fill="#fb7185"/>
    <circle cx="52" cy="24" r="7" fill="#fbbf24"/>
    <circle cx="76" cy="24" r="7" fill="#34d399"/>
    <text x="110" y="30" class="mono small">C:\HandoffKit\coding-review</text>
    <rect x="872" y="13" width="184" height="24" rx="12" fill="#052e16" stroke="#166534"/>
    <text x="896" y="30" class="mono label" fill="#bbf7d0">offline deterministic</text>

    <rect x="24" y="75" width="520" height="176" rx="16" fill="#020617" stroke="#1e293b"/>
    <rect x="24" y="75" width="520" height="176" rx="16" fill="#38bdf8" opacity=".03"/>
    <rect x="44" y="96" width="120" height="14" rx="7" fill="#1e293b"/>
    <rect x="184" y="96" width="180" height="14" rx="7" fill="#1e293b"/>
    <rect x="44" y="126" width="460" height="1" fill="#1e293b"/>

    <text x="52" y="158" class="mono cmd line l1">$ pip install handoffkit</text>
    <text x="52" y="190" class="mono cmd line l2">$ handoffkit init coding-review</text>
    <text x="52" y="222" class="mono cmd line l3">$ python coding_review.py</text>

    <rect x="584" y="75" width="480" height="176" rx="16" fill="#07111f" stroke="#1e293b"/>
    <text x="612" y="112" class="sans label">REPORT OUTPUT</text>
    <text x="612" y="150" class="mono body line l4">validation: <tspan class="ok">passed</tspan></text>
    <text x="612" y="182" class="mono body line l5">quality: <tspan class="ok">A / 1.000</tspan></text>
    <text x="612" y="214" class="mono body line l6">replay: <tspan class="ok">4 steps, 3 handoffs</tspan></text>
    <rect x="612" y="232" width="384" height="4" rx="2" fill="#1e293b"/>
    <rect x="612" y="232" width="160" height="4" rx="2" fill="url(#rail)" class="scan"/>
  </g>

  <g transform="translate(96 500)" filter="url(#elevate)">
    <rect width="520" height="154" rx="22" class="soft"/>
    <rect x="22" y="22" width="128" height="30" rx="15" fill="#3f1518" stroke="#7f1d1d"/>
    <text x="42" y="42" class="sans label" fill="#fecaca">BEFORE</text>
    <text x="22" y="82" class="sans bad" font-size="24" font-weight="780">Before: vague summary</text>
    <text x="22" y="118" class="sans body">"Calculator basically done. Reviewer found</text>
    <text x="22" y="144" class="sans body">one issue. Tester should run it."</text>
  </g>

  <g transform="translate(664 500)" filter="url(#elevate)">
    <rect width="520" height="154" rx="22" class="soft"/>
    <rect x="22" y="22" width="112" height="30" rx="15" fill="#052e16" stroke="#166534"/>
    <text x="43" y="42" class="sans label" fill="#bbf7d0">AFTER</text>
    <text x="22" y="82" class="sans ok" font-size="24" font-weight="780">After: HandoffState</text>
    <text x="22" y="116" class="mono body">decisions | files | errors | next_steps</text>
    <text x="22" y="142" class="mono warn">validation + quality + replay report</text>
  </g>

  <g transform="translate(96 681)">
    <text x="0" y="0" class="mono small">pip install handoffkit  ->  handoffkit init coding-review  ->  handoffkit report runs/latest</text>
  </g>
</svg>
