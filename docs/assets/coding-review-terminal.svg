<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit coding-review terminal demo</title>
  <desc id="desc">A terminal walkthrough showing pip install handoffkit, the coding-review demo, and the difference between vague summaries and structured HandoffState.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0f241f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="124%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .eyebrow { fill: #bae6fd; font-size: 13px; font-weight: 800; letter-spacing: 0; }
      .title { fill: #f8fafc; font-size: 38px; font-weight: 840; letter-spacing: 0; }
      .lead { fill: #cbd5e1; font-size: 18px; font-weight: 540; letter-spacing: 0; }
      .small { fill: #94a3b8; font-size: 13px; font-weight: 560; letter-spacing: 0; }
      .label { fill: #94a3b8; font-size: 12px; font-weight: 800; letter-spacing: 0; }
      .body { fill: #e5e7eb; font-size: 17px; font-weight: 540; letter-spacing: 0; }
      .cmd { fill: #7dd3fc; font-size: 17px; font-weight: 760; letter-spacing: 0; }
      .ok { fill: #86efac; }
      .warn { fill: #fde047; }
      .bad { fill: #fca5a5; }
      .panel { fill: #101827; stroke: #2a3952; stroke-width: 1.2; }
      .inner { fill: #07111f; stroke: #203047; stroke-width: 1; }
      .line { opacity: 0; animation: reveal 12s infinite ease-out; }
      .l1 { animation-delay: .2s; }
      .l2 { animation-delay: 1.1s; }
      .l3 { animation-delay: 2.0s; }
      .l4 { animation-delay: 3.0s; }
      .l5 { animation-delay: 4.0s; }
      .l6 { animation-delay: 5.0s; }
      .l7 { animation-delay: 6.0s; }
      @keyframes reveal {
        0%, 5% { opacity: 0; transform: translateY(6px); }
        10%, 88% { opacity: 1; transform: translateY(0); }
        95%, 100% { opacity: 0; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .line { opacity: 1; animation: none; }
      }
    </style>
  </defs>

  <rect width="1280" height="760" rx="36" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1277" height="757" rx="34.5" fill="none" stroke="#243247" stroke-width="3"/>

  <g transform="translate(92 54)">
    <rect width="134" height="34" rx="17" fill="#0b3550" stroke="#17648c"/>
    <text x="20" y="23" class="mono eyebrow">DEMO VIDEO</text>
    <text x="0" y="92" class="sans title">From context soup to contract handoffs</text>
    <text x="0" y="128" class="sans lead">Run the demo locally. See exactly what vague summaries lose and HandoffState preserves.</text>
    <rect x="0" y="154" width="620" height="6" rx="3" fill="url(#accent)"/>
    <rect x="780" y="38" width="300" height="50" rx="18" fill="#020617" stroke="#25344d"/>
    <text x="806" y="69" class="mono cmd">pip install handoffkit</text>
  </g>

  <g transform="translate(92 238)" filter="url(#shadow)">
    <rect width="1096" height="250" rx="24" class="panel"/>
    <rect width="1096" height="48" rx="24" fill="#070a16"/>
    <path d="M0 48H1096" stroke="#26344c"/>
    <circle cx="30" cy="24" r="7" fill="#fb7185"/>
    <circle cx="54" cy="24" r="7" fill="#fbbf24"/>
    <circle cx="78" cy="24" r="7" fill="#34d399"/>
    <text x="112" y="30" class="mono small">C:\HandoffKit\coding-review</text>
    <rect x="872" y="13" width="190" height="24" rx="12" fill="#082f1a" stroke="#176534"/>
    <text x="896" y="30" class="mono label" fill="#bbf7d0">offline deterministic</text>

    <rect x="28" y="76" width="514" height="142" rx="16" class="inner"/>
    <rect x="54" y="99" width="130" height="14" rx="7" fill="#233047"/>
    <rect x="204" y="99" width="182" height="14" rx="7" fill="#233047"/>
    <path d="M54 128H512" stroke="#223047"/>
    <text x="58" y="160" class="mono cmd line l1">$ pip install handoffkit</text>
    <text x="58" y="192" class="mono cmd line l2">$ handoffkit init coding-review</text>
    <text x="58" y="224" class="mono cmd line l3">$ python coding_review.py</text>

    <rect x="590" y="76" width="478" height="142" rx="16" fill="#0b0d1a" stroke="#26344c"/>
    <text x="618" y="111" class="sans label">REPORT OUTPUT</text>
    <text x="618" y="147" class="mono body line l4">validation: <tspan class="ok">passed</tspan></text>
    <text x="618" y="179" class="mono body line l5">quality: <tspan class="ok">A / 1.000</tspan></text>
    <text x="618" y="211" class="mono body line l6">replay: <tspan class="ok">4 steps, 3 handoffs</tspan></text>
  </g>

  <g transform="translate(92 532)" filter="url(#shadow)">
    <rect width="516" height="138" rx="22" fill="#151323" stroke="#332944"/>
    <rect x="22" y="20" width="112" height="28" rx="14" fill="#43181a" stroke="#7f1d1d"/>
    <text x="43" y="39" class="sans label" fill="#fecaca">BEFORE</text>
    <text x="22" y="78" class="sans bad" font-size="23" font-weight="800">Before: vague summary</text>
    <text x="22" y="111" class="sans body">"Calculator basically done. Reviewer found</text>
    <text x="22" y="136" class="sans body">one issue. Tester should run it."</text>
  </g>

  <g transform="translate(672 532)" filter="url(#shadow)">
    <rect width="516" height="138" rx="22" fill="#111827" stroke="#26344c"/>
    <rect x="22" y="20" width="104" height="28" rx="14" fill="#082f1a" stroke="#166534"/>
    <text x="43" y="39" class="sans label" fill="#bbf7d0">AFTER</text>
    <text x="22" y="78" class="sans ok" font-size="23" font-weight="800">After: HandoffState</text>
    <text x="22" y="112" class="mono body">decisions | files | errors | next_steps</text>
    <text x="22" y="136" class="mono warn line l7">validation + quality + replay report</text>
  </g>

  <text x="92" y="714" class="mono small">pip install handoffkit -> handoffkit init coding-review -> python coding_review.py -> handoffkit report runs/latest</text>
</svg>
