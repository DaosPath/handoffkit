<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="700" viewBox="0 0 1280 700" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit coding-review demo</title>
  <desc id="desc">Before and after: vague context soup vs structured HandoffState contracts — across Python, JavaScript, Rust, and C++.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="0.5" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="accentH" x1="68" y1="0" x2="628" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.33" stop-color="#059669"/>
      <stop offset="0.66" stop-color="#f97316"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="118%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="termShadow" x="-5%" y="-8%" width="110%" height="122%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.20"/>
    </filter>
    <style>
      .f  { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .m  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="700" rx="32" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1277" height="697" rx="30.5" fill="none" stroke="#dbe4ef" stroke-width="3"/>

  <!-- ─── HEADER AREA ─── -->
  <!-- Eyebrow pill -->
  <rect x="68" y="52" width="118" height="30" rx="15" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1"/>
  <text x="88" y="72" class="m" font-size="11" font-weight="800" fill="#1d4ed8">5 MIN DEMO</text>

  <!-- Title -->
  <text x="68" y="124" class="f" font-size="42" font-weight="860" fill="#0f172a">Context soup becomes a contract</text>
  <!-- Subtitle -->
  <text x="68" y="158" class="f" font-size="17" font-weight="500" fill="#475569">Run a coding-agent workflow, then inspect exactly what the next agent receives.</text>
  <!-- Accent bar: x=68, w=560 → right edge = 628. OK. -->
  <rect x="68" y="178" width="560" height="5" rx="2.5" fill="url(#accentH)"/>

  <!-- Terminal block: x=738, w=474 → right edge = 1212. Margin=68px ✓ -->
  <g transform="translate(738 52)" filter="url(#termShadow)">
    <rect width="474" height="136" rx="20" fill="#0b1020" stroke="#1e293b" stroke-width="1.2"/>
    <!-- Traffic lights -->
    <circle cx="28" cy="28" r="6" fill="#fb7185"/>
    <circle cx="52" cy="28" r="6" fill="#fbbf24"/>
    <circle cx="76" cy="28" r="6" fill="#34d399"/>
    <!-- Divider -->
    <line x1="28" y1="48" x2="446" y2="48" stroke="#1e293b" stroke-width="1"/>
    <!-- Commands -->
    <text x="28" y="82" class="m" font-size="15" font-weight="700" fill="#dbeafe">$ pip install handoffkit</text>
    <text x="28" y="112" class="m" font-size="15" font-weight="700" fill="#dbeafe">$ handoffkit init coding-review</text>
  </g>

  <!-- ─── BEFORE card: x=68, w=378 → right edge = 446. Margin OK ─── -->
  <g transform="translate(68 218)" filter="url(#cardShadow)">
    <rect width="378" height="386" rx="24" fill="#ffffff" stroke="#dbe4ef" stroke-width="1.2"/>
    <!-- Red top stripe -->
    <rect width="378" height="6" rx="3" fill="#fb7185"/>

    <!-- BEFORE badge -->
    <rect x="24" y="22" width="92" height="28" rx="14" fill="#ffe4e6" stroke="#fecdd3" stroke-width="1"/>
    <text x="40" y="41" class="m" font-size="11" font-weight="800" fill="#be123c">BEFORE</text>

    <!-- Card title -->
    <text x="24" y="90" class="f" font-size="22" font-weight="820" fill="#be123c">Before: vague summary</text>

    <!-- Quote box -->
    <rect x="24" y="106" width="330" height="122" rx="16" fill="#fff1f2" stroke="#ffe4e6" stroke-width="1"/>
    <text x="44" y="140" class="f" font-size="16" font-weight="560" fill="#334155">"Basically done.</text>
    <text x="44" y="168" class="f" font-size="16" font-weight="560" fill="#334155">Reviewer found an issue.</text>
    <text x="44" y="196" class="f" font-size="16" font-weight="560" fill="#334155">Tester should run it."</text>

    <!-- Divider -->
    <line x1="24" y1="248" x2="354" y2="248" stroke="#ffe4e6" stroke-width="1.5" stroke-dasharray="5 4"/>

    <!-- Lost label -->
    <text x="24" y="284" class="m" font-size="12" font-weight="700" fill="#be123c">lost: files, decisions, errors, next steps</text>

    <!-- Crossed-out checks -->
    <g transform="translate(24 310)">
      <rect width="78" height="24" rx="12" fill="#ffe4e6"/>
      <text x="10" y="17" class="m" font-size="10" font-weight="700" fill="#be123c">no files</text>
      <rect x="88" width="88" height="24" rx="12" fill="#ffe4e6"/>
      <text x="98" y="17" class="m" font-size="10" font-weight="700" fill="#be123c">no decisions</text>
      <rect x="186" width="70" height="24" rx="12" fill="#ffe4e6"/>
      <text x="196" y="17" class="m" font-size="10" font-weight="700" fill="#be123c">no trace</text>
    </g>

    <!-- Footer note -->
    <text x="24" y="368" class="f" font-size="13" fill="#94a3b8">Next agent guesses. Context balloons.</text>
  </g>

  <!-- ─── ARROW + LABELS: x=472, gap to AFTER card at x=622 ─── -->
  <!-- Arrow horizontal centered between 446 and 622: midpoint ~534 -->
  <g transform="translate(472 376)">
    <!-- "lost" label above arrow -->
    <rect x="18" y="-68" width="92" height="32" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
    <text x="36" y="-47" class="m" font-size="12" font-weight="700" fill="#64748b">lost</text>

    <!-- Arrow line: 0 to 120 -->
    <line x1="0" y1="0" x2="116" y2="0" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <path d="M104 -12 L120 0 L104 12" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- "becomes" label below arrow -->
    <rect x="8" y="38" width="108" height="32" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="1.2"/>
    <text x="22" y="59" class="m" font-size="12" font-weight="700" fill="#64748b">becomes</text>
  </g>

  <!-- ─── AFTER card: x=622, w=590 → right edge = 1212. Margin=68px ✓ ─── -->
  <g transform="translate(622 218)" filter="url(#cardShadow)">
    <rect width="590" height="386" rx="24" fill="#ffffff" stroke="#dbe4ef" stroke-width="1.2"/>
    <!-- Gradient top stripe -->
    <defs>
      <linearGradient id="afterBar" x1="0" y1="0" x2="1" y2="0">
        <stop stop-color="#38bdf8"/>
        <stop offset="0.33" stop-color="#4ade80"/>
        <stop offset="0.66" stop-color="#fb923c"/>
        <stop offset="1" stop-color="#a78bfa"/>
      </linearGradient>
    </defs>
    <rect width="590" height="6" rx="3" fill="url(#afterBar)"/>

    <!-- AFTER badge -->
    <rect x="24" y="22" width="80" height="28" rx="14" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
    <text x="40" y="41" class="m" font-size="11" font-weight="800" fill="#047857">AFTER</text>

    <!-- Card title -->
    <text x="24" y="90" class="f" font-size="22" font-weight="820" fill="#047857">After: HandoffState</text>
    <text x="24" y="116" class="f" font-size="14" font-weight="500" fill="#64748b">Structured state travels as data, not a fragile paragraph.</text>

    <!-- 2×2 field grid
         Each row: 2 pills
         Pill width = (590 - 24 - 24 - 16) / 2 = 263px each
         Row 1: y=138, Row 2: y=202 -->
    <g transform="translate(24 138)">
      <!-- decisions -->
      <rect width="263" height="48" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
      <circle cx="24" cy="24" r="7" fill="#2563eb"/>
      <text x="44" y="20" class="f" font-size="13" font-weight="700" fill="#334155">decisions</text>
      <text x="44" y="38" class="m" font-size="12" fill="#1d4ed8">use argparse, pure fns</text>

      <!-- files -->
      <rect x="279" width="263" height="48" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
      <circle cx="303" cy="24" r="7" fill="#059669"/>
      <text x="323" y="20" class="f" font-size="13" font-weight="700" fill="#334155">files</text>
      <text x="323" y="38" class="m" font-size="12" fill="#047857">calculator.py, tests.py</text>

      <!-- errors -->
      <rect y="64" width="263" height="48" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
      <circle cx="24" cy="88" r="7" fill="#be123c"/>
      <text x="44" y="84" class="f" font-size="13" font-weight="700" fill="#334155">errors</text>
      <text x="44" y="102" class="m" font-size="12" fill="#be123c">checked path, none</text>

      <!-- next_steps -->
      <rect x="279" y="64" width="263" height="48" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
      <circle cx="303" cy="88" r="7" fill="#f59e0b"/>
      <text x="323" y="84" class="f" font-size="13" font-weight="700" fill="#334155">next_steps</text>
      <text x="323" y="102" class="m" font-size="12" fill="#b45309">pytest -q, coverage</text>
    </g>

    <!-- Divider -->
    <line x1="24" y1="322" x2="566" y2="322" stroke="#e2e8f0" stroke-width="1.5"/>

    <!-- Metric pills row: 3 pills
         Available width = 590 - 24 - 24 = 542px
         3 pills with 12px gaps: (542 - 24) / 3 = 172px each -->
    <g transform="translate(24 338)">
      <rect width="164" height="34" rx="17" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1.2"/>
      <text x="16" y="22" class="m" font-size="12" font-weight="700" fill="#047857">validation passed</text>

      <rect x="178" width="164" height="34" rx="17" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
      <text x="196" y="22" class="m" font-size="12" font-weight="700" fill="#1d4ed8">quality A / 1.000</text>

      <rect x="356" width="194" height="34" rx="17" fill="#fffbeb" stroke="#fde68a" stroke-width="1.2"/>
      <text x="374" y="22" class="m" font-size="12" font-weight="700" fill="#92400e">replay: 4 steps, 3 handoffs</text>
    </g>
  </g>
</svg>
