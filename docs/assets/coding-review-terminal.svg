<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit coding-review terminal demo</title>
  <desc id="desc">Compact HandoffKit demo banner showing terminal commands and the before versus after handoff report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111f"/>
      <stop offset="0.58" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#10241f"/>
    </linearGradient>
    <linearGradient id="accent" x1="92" y1="0" x2="1188" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-6%" y="-8%" width="112%" height="118%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .eyebrow { fill: #bae6fd; font-size: 12px; font-weight: 800; letter-spacing: 0; }
      .title { fill: #f8fafc; font-size: 32px; font-weight: 840; letter-spacing: 0; }
      .lead { fill: #cbd5e1; font-size: 16px; font-weight: 540; letter-spacing: 0; }
      .small { fill: #94a3b8; font-size: 12px; font-weight: 560; letter-spacing: 0; }
      .label { fill: #94a3b8; font-size: 11px; font-weight: 800; letter-spacing: 0; }
      .body { fill: #e5e7eb; font-size: 16px; font-weight: 540; letter-spacing: 0; }
      .cmd { fill: #7dd3fc; font-size: 16px; font-weight: 760; letter-spacing: 0; }
      .ok { fill: #86efac; }
      .warn { fill: #fde047; }
      .bad { fill: #fca5a5; }
      .panel { fill: #101827; stroke: #2a3952; stroke-width: 1.2; }
      .inner { fill: #07111f; stroke: #203047; stroke-width: 1; }
      .line { opacity: 0; animation: reveal 12s infinite ease-out; }
      .l1 { animation-delay: .2s; }
      .l2 { animation-delay: 1.1s; }
      .l3 { animation-delay: 2.0s; }
      .l4 { animation-delay: 3.0s; }
      .l5 { animation-delay: 4.0s; }
      .l6 { animation-delay: 5.0s; }
      .l7 { animation-delay: 6.0s; }
      @keyframes reveal {
        0%, 5% { opacity: 0; transform: translateY(5px); }
        10%, 88% { opacity: 1; transform: translateY(0); }
        95%, 100% { opacity: 0; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .line { opacity: 1; animation: none; }
      }
    </style>
  </defs>

  <rect width="1280" height="520" rx="30" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1277" height="517" rx="28.5" fill="none" stroke="#243247" stroke-width="3"/>

  <g transform="translate(72 44)">
    <rect width="126" height="30" rx="15" fill="#0b3550" stroke="#17648c"/>
    <text x="18" y="20" class="mono eyebrow">DEMO VIDEO</text>
    <text x="0" y="70" class="sans title">Context soup vs contract handoffs</text>
    <text x="0" y="98" class="sans lead">A 5-minute coding-agent flow: install, run, inspect the structured report.</text>
    <rect x="0" y="122" width="520" height="5" rx="2.5" fill="url(#accent)"/>
    <rect x="760" y="28" width="300" height="48" rx="16" fill="#020617" stroke="#25344d"/>
    <text x="786" y="58" class="mono cmd">pip install handoffkit</text>
  </g>

  <g transform="translate(72 190)" filter="url(#shadow)">
    <rect width="1136" height="172" rx="22" class="panel"/>
    <rect width="1136" height="42" rx="22" fill="#070a16"/>
    <path d="M0 42H1136" stroke="#26344c"/>
    <circle cx="28" cy="21" r="7" fill="#fb7185"/>
    <circle cx="52" cy="21" r="7" fill="#fbbf24"/>
    <circle cx="76" cy="21" r="7" fill="#34d399"/>
    <text x="112" y="27" class="mono small">C:\HandoffKit\coding-review</text>
    <rect x="898" y="10" width="198" height="24" rx="12" fill="#082f1a" stroke="#176534"/>
    <text x="922" y="27" class="mono label" fill="#bbf7d0">offline deterministic</text>

    <rect x="26" y="64" width="530" height="84" rx="14" class="inner"/>
    <text x="50" y="98" class="mono cmd line l1">$ pip install handoffkit</text>
    <text x="50" y="124" class="mono cmd line l2">$ handoffkit init coding-review</text>
    <text x="50" y="150" class="mono cmd line l3">$ python coding_review.py</text>

    <rect x="604" y="64" width="506" height="84" rx="14" fill="#0b0d1a" stroke="#26344c"/>
    <text x="630" y="94" class="sans label">REPORT OUTPUT</text>
    <text x="630" y="126" class="mono body line l4">validation: <tspan class="ok">passed</tspan>   quality: <tspan class="ok">A / 1.000</tspan></text>
    <text x="630" y="152" class="mono body line l5">replay: <tspan class="ok">4 steps, 3 handoffs</tspan></text>
  </g>

  <g transform="translate(72 396)" filter="url(#shadow)">
    <rect width="540" height="82" rx="18" fill="#151323" stroke="#332944"/>
    <rect x="18" y="16" width="96" height="24" rx="12" fill="#43181a" stroke="#7f1d1d"/>
    <text x="39" y="32" class="sans label" fill="#fecaca">BEFORE</text>
    <text x="132" y="33" class="sans bad" font-size="19" font-weight="800">Before: vague summary</text>
    <text x="18" y="62" class="sans body">"Calculator basically done. Tester should run it."</text>
  </g>

  <g transform="translate(668 396)" filter="url(#shadow)">
    <rect width="540" height="82" rx="18" fill="#111827" stroke="#26344c"/>
    <rect x="18" y="16" width="88" height="24" rx="12" fill="#082f1a" stroke="#166534"/>
    <text x="38" y="32" class="sans label" fill="#bbf7d0">AFTER</text>
    <text x="124" y="33" class="sans ok" font-size="19" font-weight="800">After: HandoffState</text>
    <text x="18" y="62" class="mono body line l6">decisions | files | errors | next_steps | <tspan class="warn line l7">replay report</tspan></text>
  </g>
</svg>
