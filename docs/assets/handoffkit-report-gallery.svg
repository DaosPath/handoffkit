<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit report gallery</title>
  <desc id="desc">Report gallery: three HandoffKit reports for coding agents, support escalation, and research workflow — across Python, JavaScript, Rust, and C++.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="barH" x1="68" y1="0" x2="1212" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.33" stop-color="#059669"/>
      <stop offset="0.66" stop-color="#ea580c"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="110%" height="116%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <filter id="term" x="-4%" y="-6%" width="108%" height="118%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .f  { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .m  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1277" height="717" rx="30.5" fill="none" stroke="#dbe4ef" stroke-width="3"/>

  <!-- Decorative blobs -->
  <circle cx="1160" cy="100" r="100" fill="#bbf7d0" fill-opacity="0.40"/>
  <circle cx="1048" cy="78" r="62" fill="#bfdbfe" fill-opacity="0.44"/>

  <!-- Header -->
  <rect x="68" y="52" width="172" height="30" rx="15" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1"/>
  <text x="86" y="72" class="m" font-size="11" font-weight="800" fill="#1d4ed8">REPORT GALLERY · 4 RUNTIMES</text>
  <text x="68" y="134" class="f" font-size="42" font-weight="840" fill="#0f172a">Reports people can inspect</text>
  <text x="68" y="166" class="f" font-size="17" font-weight="500" fill="#42526b">Every workflow writes Markdown, JSON, trace, validation, quality, and replay evidence.</text>

  <!-- Gradient rule: x=68, w=580 → right=648. OK -->
  <rect x="68" y="184" width="580" height="5" rx="2.5" fill="url(#barH)"/>

  <!-- ── Card 1: Coding (x=68, w=356 → right=424) ── -->
  <g transform="translate(68 212)" filter="url(#card)">
    <rect width="356" height="334" rx="24" fill="#ffffff" stroke="#dbe4ef" stroke-width="1.2"/>
    <rect width="356" height="6" rx="3" fill="#2563eb"/>

    <rect x="24" y="22" width="82" height="26" rx="13" fill="#dbeafe"/>
    <text x="36" y="39" class="m" font-size="11" font-weight="800" fill="#1d4ed8">CODING</text>

    <text x="24" y="84" class="f" font-size="20" font-weight="820" fill="#0f172a">coding_review.md</text>
    <text x="24" y="110" class="f" font-size="13" fill="#475569">Architect → Coder → Reviewer → Tester</text>

    <rect x="24" y="126" width="308" height="78" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="42" y="156" class="f" font-size="14" fill="#475569">Preserves files, decisions, errors,</text>
    <text x="42" y="178" class="f" font-size="14" fill="#475569">review fixes, and test commands.</text>

    <!-- Runtime badges -->
    <g transform="translate(24 222)">
      <rect width="56" height="22" rx="11" fill="#dbeafe"/>
      <text x="10" y="15" class="m" font-size="10" font-weight="800" fill="#1d4ed8">Python</text>
      <rect x="64" width="74" height="22" rx="11" fill="#fef9c3"/>
      <text x="72" y="15" class="m" font-size="10" font-weight="800" fill="#92400e">JavaScript</text>
      <rect x="146" width="48" height="22" rx="11" fill="#ffedd5"/>
      <text x="155" y="15" class="m" font-size="10" font-weight="800" fill="#9a3412">Rust</text>
      <rect x="202" width="44" height="22" rx="11" fill="#f5f3ff"/>
      <text x="210" y="15" class="m" font-size="10" font-weight="800" fill="#4c1d95">C++</text>
    </g>

    <!-- Metric -->
    <line x1="24" y1="264" x2="332" y2="264" stroke="#e2e8f0" stroke-width="1.2"/>
    <text x="24" y="302" class="f" font-size="30" font-weight="860" fill="#0f172a">A</text>
    <text x="58" y="302" class="m" font-size="12" font-weight="780" fill="#14532d">quality / 3 handoffs / replay</text>
  </g>

  <!-- ── Card 2: Support (x=444, w=356 → right=800) ── -->
  <g transform="translate(444 212)" filter="url(#card)">
    <rect width="356" height="334" rx="24" fill="#ffffff" stroke="#dbe4ef" stroke-width="1.2"/>
    <rect width="356" height="6" rx="3" fill="#0f766e"/>

    <rect x="24" y="22" width="84" height="26" rx="13" fill="#ccfbf1"/>
    <text x="36" y="39" class="m" font-size="11" font-weight="800" fill="#0f766e">SUPPORT</text>

    <text x="24" y="84" class="f" font-size="20" font-weight="820" fill="#0f172a">support_escalation.md</text>
    <text x="24" y="110" class="f" font-size="13" fill="#475569">Triage → Billing → Refund → Supervisor</text>

    <rect x="24" y="126" width="308" height="78" rx="16" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1"/>
    <text x="42" y="156" class="f" font-size="14" fill="#475569">Keeps charge IDs, policy checks,</text>
    <text x="42" y="178" class="f" font-size="14" fill="#475569">correction notes, and approvals.</text>

    <g transform="translate(24 222)">
      <rect width="56" height="22" rx="11" fill="#dbeafe"/>
      <text x="10" y="15" class="m" font-size="10" font-weight="800" fill="#1d4ed8">Python</text>
      <rect x="64" width="74" height="22" rx="11" fill="#fef9c3"/>
      <text x="72" y="15" class="m" font-size="10" font-weight="800" fill="#92400e">JavaScript</text>
      <rect x="146" width="48" height="22" rx="11" fill="#ffedd5"/>
      <text x="155" y="15" class="m" font-size="10" font-weight="800" fill="#9a3412">Rust</text>
      <rect x="202" width="44" height="22" rx="11" fill="#f5f3ff"/>
      <text x="210" y="15" class="m" font-size="10" font-weight="800" fill="#4c1d95">C++</text>
    </g>

    <line x1="24" y1="264" x2="332" y2="264" stroke="#e2e8f0" stroke-width="1.2"/>
    <text x="24" y="302" class="f" font-size="30" font-weight="860" fill="#0f172a">0.925</text>
    <text x="112" y="302" class="m" font-size="12" font-weight="780" fill="#14532d">quality / audit trail</text>
  </g>

  <!-- ── Card 3: Research (x=820, w=356 → right=1176) margin=104px ✓ ── -->
  <g transform="translate(820 212)" filter="url(#card)">
    <rect width="356" height="334" rx="24" fill="#ffffff" stroke="#dbe4ef" stroke-width="1.2"/>
    <rect width="356" height="6" rx="3" fill="#7c3aed"/>

    <rect x="24" y="22" width="92" height="26" rx="13" fill="#ede9fe"/>
    <text x="36" y="39" class="m" font-size="11" font-weight="800" fill="#6d28d9">RESEARCH</text>

    <text x="24" y="84" class="f" font-size="20" font-weight="820" fill="#0f172a">research_workflow.md</text>
    <text x="24" y="110" class="f" font-size="13" fill="#475569">Researcher → Extractor → Fact-checker</text>

    <rect x="24" y="126" width="308" height="78" rx="16" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="42" y="156" class="f" font-size="14" fill="#475569">Tracks sources, claims, confidence,</text>
    <text x="42" y="178" class="f" font-size="14" fill="#475569">corrections, and writer constraints.</text>

    <g transform="translate(24 222)">
      <rect width="56" height="22" rx="11" fill="#dbeafe"/>
      <text x="10" y="15" class="m" font-size="10" font-weight="800" fill="#1d4ed8">Python</text>
      <rect x="64" width="74" height="22" rx="11" fill="#fef9c3"/>
      <text x="72" y="15" class="m" font-size="10" font-weight="800" fill="#92400e">JavaScript</text>
      <rect x="146" width="48" height="22" rx="11" fill="#ffedd5"/>
      <text x="155" y="15" class="m" font-size="10" font-weight="800" fill="#9a3412">Rust</text>
      <rect x="202" width="44" height="22" rx="11" fill="#f5f3ff"/>
      <text x="210" y="15" class="m" font-size="10" font-weight="800" fill="#4c1d95">C++</text>
    </g>

    <line x1="24" y1="264" x2="332" y2="264" stroke="#e2e8f0" stroke-width="1.2"/>
    <text x="24" y="302" class="f" font-size="30" font-weight="860" fill="#0f172a">0.912</text>
    <text x="112" y="302" class="m" font-size="12" font-weight="780" fill="#14532d">quality / sources</text>
  </g>

  <!-- Bottom terminal bar: x=68, w=1144 → right=1212. margin=68px ✓ -->
  <g transform="translate(68 590)" filter="url(#term)">
    <rect width="1144" height="62" rx="18" fill="#0f1220"/>
    <circle cx="26" cy="31" r="5" fill="#fb7185"/>
    <circle cx="44" cy="31" r="5" fill="#facc15"/>
    <circle cx="62" cy="31" r="5" fill="#4ade80"/>
    <text x="88" y="26" class="m" font-size="13" font-weight="700" fill="#dbeafe">$ handoffkit demos</text>
    <text x="300" y="26" class="m" font-size="13" font-weight="700" fill="#dbeafe">$ handoffkit showcase coding-review</text>
    <text x="656" y="26" class="m" font-size="13" font-weight="700" fill="#dbeafe">$ handoffkit report runs/latest</text>
    <text x="88" y="48" class="m" font-size="11" fill="#334155">Python · JavaScript · Rust · C++ · Shared JSON wire format · validated · replayable</text>
  </g>
</svg>
