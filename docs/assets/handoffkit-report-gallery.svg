<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit Report Gallery</title>
  <desc id="desc">Three inspectable HandoffKit reports for coding review, support escalation, and research workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060913"/>
      <stop offset="0.55" stop-color="#0a1120"/>
      <stop offset="1" stop-color="#09170f"/>
    </linearGradient>
    <linearGradient id="accent" x1="68" y1="0" x2="1212" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.34" stop-color="#4ade80"/>
      <stop offset="0.68" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#21304a" stroke-opacity="0.28"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="134%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="600" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="600" rx="30" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="1277" height="597" rx="28.5" fill="none" stroke="#22304a" stroke-width="3"/>

  <rect x="68" y="44" width="142" height="30" rx="15" fill="#22143d" stroke="#7c3aed"/>
  <text x="88" y="64" class="mono" font-size="10" font-weight="800" fill="#c4b5fd">REPORT GALLERY</text>
  <text x="68" y="112" class="sans" font-size="40" font-weight="850" fill="#f8fafc">Evidence people can inspect</text>
  <text x="68" y="142" class="sans" font-size="15" fill="#8fa4c0">Every workflow can export its contract, validation, quality, trace, and replay summary.</text>
  <rect x="68" y="164" width="1144" height="4" rx="2" fill="url(#accent)"/>

  <g transform="translate(68 198)" filter="url(#shadow)">
    <rect width="354" height="300" rx="22" fill="#0b1424" stroke="#24506d" stroke-width="1.5"/>
    <rect width="354" height="6" rx="3" fill="#38bdf8"/>
    <rect x="24" y="24" width="74" height="26" rx="13" fill="#0d2234"/>
    <text x="42" y="42" class="mono" font-size="10" font-weight="800" fill="#7dd3fc">CODING</text>
    <text x="24" y="88" class="mono" font-size="17" font-weight="800" fill="#f8fafc">coding_review.md</text>
    <text x="24" y="112" class="sans" font-size="12" fill="#8fa4c0">Architect → Coder → Reviewer → Tester</text>

    <rect x="24" y="132" width="306" height="76" rx="14" fill="#070c15" stroke="#22304a"/>
    <text x="42" y="158" class="mono" font-size="10" fill="#7dd3fc">files: 4 · decisions: 6 · errors: 0</text>
    <text x="42" y="180" class="mono" font-size="10" fill="#7dd3fc">steps: 4 · handoffs: 3 · replay: ready</text>

    <text x="24" y="248" class="sans" font-size="30" font-weight="900" fill="#86efac">A</text>
    <text x="58" y="244" class="mono" font-size="10" font-weight="700" fill="#8fa4c0">quality score</text>
    <rect x="210" y="226" width="120" height="30" rx="15" fill="#0b2b1c" stroke="#166534"/>
    <text x="228" y="246" class="mono" font-size="10" font-weight="800" fill="#86efac">validated ✓</text>
    <text x="24" y="282" class="mono" font-size="10" fill="#64748b">JSON twin: coding_review.json</text>
  </g>

  <g transform="translate(463 198)" filter="url(#shadow)">
    <rect width="354" height="300" rx="22" fill="#0b1424" stroke="#286442" stroke-width="1.5"/>
    <rect width="354" height="6" rx="3" fill="#4ade80"/>
    <rect x="24" y="24" width="76" height="26" rx="13" fill="#0b2b1c"/>
    <text x="42" y="42" class="mono" font-size="10" font-weight="800" fill="#86efac">SUPPORT</text>
    <text x="24" y="88" class="mono" font-size="17" font-weight="800" fill="#f8fafc">support_escalation.md</text>
    <text x="24" y="112" class="sans" font-size="12" fill="#8fa4c0">Triage → Billing → Refund → Supervisor</text>

    <rect x="24" y="132" width="306" height="76" rx="14" fill="#070c15" stroke="#22304a"/>
    <text x="42" y="158" class="mono" font-size="10" fill="#86efac">policy checks · charge IDs · approvals</text>
    <text x="42" y="180" class="mono" font-size="10" fill="#86efac">audit trail · escalation context · outcome</text>

    <text x="24" y="248" class="sans" font-size="30" font-weight="900" fill="#86efac">0.925</text>
    <text x="112" y="244" class="mono" font-size="10" font-weight="700" fill="#8fa4c0">quality</text>
    <rect x="210" y="226" width="120" height="30" rx="15" fill="#0b2b1c" stroke="#166534"/>
    <text x="228" y="246" class="mono" font-size="10" font-weight="800" fill="#86efac">audit ready</text>
    <text x="24" y="282" class="mono" font-size="10" fill="#64748b">JSON twin: support_escalation.json</text>
  </g>

  <g transform="translate(858 198)" filter="url(#shadow)">
    <rect width="354" height="300" rx="22" fill="#0b1424" stroke="#554178" stroke-width="1.5"/>
    <rect width="354" height="6" rx="3" fill="#a78bfa"/>
    <rect x="24" y="24" width="82" height="26" rx="13" fill="#22143d"/>
    <text x="42" y="42" class="mono" font-size="10" font-weight="800" fill="#c4b5fd">RESEARCH</text>
    <text x="24" y="88" class="mono" font-size="17" font-weight="800" fill="#f8fafc">research_workflow.md</text>
    <text x="24" y="112" class="sans" font-size="12" fill="#8fa4c0">Researcher → Extractor → Checker → Writer</text>

    <rect x="24" y="132" width="306" height="76" rx="14" fill="#070c15" stroke="#22304a"/>
    <text x="42" y="158" class="mono" font-size="10" fill="#c4b5fd">sources · claims · confidence · citations</text>
    <text x="42" y="180" class="mono" font-size="10" fill="#c4b5fd">corrections · constraints · final synthesis</text>

    <text x="24" y="248" class="sans" font-size="30" font-weight="900" fill="#c4b5fd">0.912</text>
    <text x="112" y="244" class="mono" font-size="10" font-weight="700" fill="#8fa4c0">quality</text>
    <rect x="210" y="226" width="120" height="30" rx="15" fill="#22143d" stroke="#7c3aed"/>
    <text x="228" y="246" class="mono" font-size="10" font-weight="800" fill="#c4b5fd">traceable</text>
    <text x="24" y="282" class="mono" font-size="10" fill="#64748b">JSON twin: research_workflow.json</text>
  </g>

  <g transform="translate(68 526)">
    <rect width="1144" height="46" rx="16" fill="#050a13" stroke="#22304a"/>
    <circle cx="22" cy="23" r="4" fill="#fb7185"/>
    <circle cx="38" cy="23" r="4" fill="#facc15"/>
    <circle cx="54" cy="23" r="4" fill="#4ade80"/>
    <text x="78" y="28" class="mono" font-size="11" font-weight="700" fill="#38bdf8">$ handoffkit report runs/latest</text>
    <text x="344" y="28" class="mono" font-size="11" fill="#8fa4c0">Markdown for people · JSON for systems · replay without side effects</text>
  </g>
</svg>
