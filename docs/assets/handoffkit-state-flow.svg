<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit state flow</title>
  <desc id="desc">A comparison between vague free text handoffs and structured HandoffState transfer.</desc>
  <defs>
    <linearGradient id="line" x1="130" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <style>
      .heading { font: 800 34px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0F172A; letter-spacing: 0; }
      .label { font: 750 22px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0F172A; letter-spacing: 0; }
      .body { font: 500 16px Inter, ui-sans-serif, system-ui, sans-serif; fill: #475569; letter-spacing: 0; }
      .mono { font: 600 14px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #0F766E; letter-spacing: 0; }
      .bad { font: 600 14px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #B91C1C; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1200" height="360" rx="28" fill="#F8FAFC"/>
  <rect x="1" y="1" width="1198" height="358" rx="27" stroke="#CBD5E1" stroke-width="2"/>
  <text x="64" y="70" class="heading">From fragile summaries to replayable state</text>

  <rect x="64" y="112" width="486" height="190" rx="20" fill="#FEF2F2" stroke="#FCA5A5"/>
  <text x="94" y="154" class="label">Free-text handoff</text>
  <text x="94" y="188" class="bad">"Coder did some stuff. Tests maybe passed."</text>
  <text x="94" y="226" class="body">Important decisions, files, errors, and</text>
  <text x="94" y="250" class="body">next steps disappear between agents.</text>

  <path d="M580 207H650" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M638 195L652 207L638 219" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="682" y="112" width="454" height="190" rx="20" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="712" y="154" class="label">HandoffState</text>
  <text x="712" y="188" class="mono">task: "Build calculator CLI"</text>
  <text x="712" y="214" class="mono">decisions: ["Use argparse"]</text>
  <text x="712" y="240" class="mono">files: ["calculator.py"]</text>
  <text x="712" y="266" class="mono">next_steps: ["Run pytest -q"]</text>

  <path d="M724 322C842 292 940 292 1072 322" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
</svg>
