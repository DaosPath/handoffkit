<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit state flow</title>
  <desc id="desc">A before and after diagram showing structured HandoffState replacing vague free text context.</desc>
  <defs>
    <linearGradient id="good" x1="706" y1="118" x2="1118" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <style>
      .heading { font: 800 36px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0F172A; letter-spacing: 0; }
      .sub { font: 500 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #475569; letter-spacing: 0; }
      .label { font: 800 24px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0F172A; letter-spacing: 0; }
      .body { font: 500 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #475569; letter-spacing: 0; }
      .badCode { font: 700 15px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #991B1B; letter-spacing: 0; }
      .goodCode { font: 700 15px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #047857; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="30" fill="#F8FAFC"/>
  <rect x="1.5" y="1.5" width="1197" height="417" rx="28.5" stroke="#CBD5E1" stroke-width="3"/>

  <text x="70" y="72" class="heading">Structured handoffs beat context soup</text>
  <text x="70" y="104" class="sub">HandoffKit keeps task state explicit as agents move from planning to coding to review.</text>

  <rect x="70" y="144" width="445" height="206" rx="24" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="2"/>
  <text x="104" y="190" class="label">Before</text>
  <text x="104" y="228" class="badCode">"I think it is mostly done."</text>
  <text x="104" y="262" class="body">No files. No decisions. No errors.</text>
  <text x="104" y="290" class="body">Next agent guesses what matters.</text>

  <circle cx="600" cy="246" r="34" fill="#0F172A"/>
  <path d="M586 246H614" stroke="#F8FAFC" stroke-width="4" stroke-linecap="round"/>
  <path d="M604 236L616 246L604 256" stroke="#F8FAFC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="685" y="144" width="445" height="206" rx="24" fill="url(#good)" stroke="#6EE7B7" stroke-width="2"/>
  <text x="719" y="190" class="label">After</text>
  <text x="719" y="226" class="goodCode">task: "Build calculator CLI"</text>
  <text x="719" y="254" class="goodCode">decisions: ["Use argparse"]</text>
  <text x="719" y="282" class="goodCode">files: ["calculator.py"]</text>
  <text x="719" y="310" class="goodCode">next_steps: ["Run pytest"]</text>

  <path d="M78 376H1122" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
  <path d="M724 376H968" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
</svg>
