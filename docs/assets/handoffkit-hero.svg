<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit hero</title>
  <desc id="desc">A visual overview of structured state transfer between multi-agent workflow steps.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.52" stop-color="#18233A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="primary" x1="100" y1="80" x2="1080" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 800 72px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .subtitle { font: 500 24px Inter, ui-sans-serif, system-ui, sans-serif; fill: #CBD5E1; letter-spacing: 0; }
      .mono { font: 600 18px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #E2E8F0; letter-spacing: 0; }
      .label { font: 700 20px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .small { font: 500 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #CBD5E1; letter-spacing: 0; }
      .tiny { font: 600 13px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #BAE6FD; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="36" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="518" rx="35" stroke="#334155" stroke-opacity="0.75" stroke-width="2"/>
  <path d="M110 420C236 302 324 318 458 375C615 441 715 362 822 238C914 132 1004 92 1102 128" stroke="url(#primary)" stroke-width="2" stroke-opacity="0.45"/>
  <path d="M122 96H412" stroke="url(#primary)" stroke-width="7" stroke-linecap="round"/>

  <text x="118" y="170" class="title">HandoffKit</text>
  <text x="122" y="214" class="subtitle">Structured state transfer for multi-agent Python workflows.</text>

  <rect x="122" y="252" width="312" height="56" rx="12" fill="#020617" fill-opacity="0.62" stroke="#334155"/>
  <text x="148" y="287" class="mono">pip install handoffkit</text>

  <g filter="url(#softShadow)">
    <rect x="514" y="92" width="560" height="336" rx="24" fill="#0B1220" stroke="#334155"/>
    <rect x="540" y="122" width="156" height="74" rx="16" fill="#111827" stroke="#38BDF8" stroke-opacity="0.7"/>
    <text x="568" y="153" class="label">Architect</text>
    <text x="568" y="177" class="small">plans constraints</text>

    <rect x="784" y="122" width="156" height="74" rx="16" fill="#111827" stroke="#A78BFA" stroke-opacity="0.7"/>
    <text x="831" y="153" class="label">Coder</text>
    <text x="820" y="177" class="small">uses state</text>

    <rect x="784" y="322" width="156" height="74" rx="16" fill="#111827" stroke="#34D399" stroke-opacity="0.7"/>
    <text x="827" y="353" class="label">Tester</text>
    <text x="812" y="377" class="small">checks evidence</text>

    <rect x="566" y="235" width="326" height="128" rx="18" fill="#172033" stroke="url(#primary)" stroke-opacity="0.9"/>
    <text x="596" y="267" class="label">HandoffState</text>
    <text x="596" y="295" class="tiny">task · decisions · files</text>
    <text x="596" y="319" class="tiny">errors · next_steps · metadata</text>
    <text x="596" y="343" class="tiny">json_schema · validate · trace</text>

    <path d="M696 159H784" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M776 151L786 159L776 167" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M862 196V235" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M854 227L862 237L870 227" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M862 363V396C862 415 844 428 822 428H622C594 428 572 407 572 380V363" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M580 371L572 361L564 371" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="925" y="232" width="110" height="64" rx="14" fill="#0F172A" stroke="#475569"/>
    <text x="953" y="259" class="tiny">RunTrace</text>
    <text x="950" y="280" class="small">replayable</text>
  </g>

  <text x="122" y="370" class="small">No vague context soup. Agents pass contracts you can validate, store, replay, and test.</text>
  <text x="122" y="402" class="small">Offline-first core. Provider-neutral tools. CI-tested on Python 3.10 through 3.14.</text>
</svg>
