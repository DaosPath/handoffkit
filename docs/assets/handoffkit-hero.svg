<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit hero</title>
  <desc id="desc">HandoffKit hero graphic — language-agnostic structured state transfer for multi-agent workflows across Python, JavaScript, Rust, and C++.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070b16"/>
      <stop offset="0.55" stop-color="#0d1525"/>
      <stop offset="1" stop-color="#102016"/>
    </linearGradient>
    <linearGradient id="wash" x1="138" y1="82" x2="1180" y2="656" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="0.45" stop-color="#22c55e" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="accent" x1="72" y1="0" x2="560" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.33" stop-color="#34d399"/>
      <stop offset="0.66" stop-color="#f97316"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="stateStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#34d399"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="640" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111a2c"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#1e293b" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="25" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-12%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .eyebrow { fill: #8ddcff; font-size: 12px; font-weight: 850; }
      .title { fill: #f8fafc; font-size: 72px; font-weight: 880; }
      .subtitle { fill: #dbeafe; font-size: 21px; font-weight: 650; }
      .body { fill: #9fb4ce; font-size: 14px; font-weight: 580; }
      .terminal { fill: #d1fae5; font-size: 14px; font-weight: 780; }
      .terminalDim { fill: #94a3b8; font-size: 11px; font-weight: 760; }
      .chipText { fill: #e0f2fe; font-size: 11px; font-weight: 820; }
      .panelKicker { fill: #8ddcff; font-size: 11px; font-weight: 850; }
      .panelTitle { fill: #f8fafc; font-size: 20px; font-weight: 860; }
      .panelSub { fill: #cbd5e1; font-size: 13px; font-weight: 650; }
      .nodeTitle { fill: #f8fafc; font-size: 15px; font-weight: 860; }
      .nodeSub { fill: #cbd5e1; font-size: 11px; font-weight: 720; }
      .metric { fill: #f8fafc; font-size: 18px; font-weight: 880; }
      .metricLabel { fill: #9fb4ce; font-size: 11px; font-weight: 760; }
      .langTag { font-size: 11px; font-weight: 820; }
    </style>
  </defs>

  <rect width="1280" height="720" rx="40" fill="url(#bg)"/>
  <rect x="30" y="26" width="1220" height="668" rx="34" fill="url(#wash)" opacity="0.92"/>
  <rect width="1280" height="720" rx="40" fill="url(#grid)" opacity="0.24"/>
  <rect x="1.5" y="1.5" width="1277" height="717" rx="38.5" fill="none" stroke="#31435e" stroke-width="3"/>

  <path d="M72 132H560" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M72 618H430" stroke="#26364f" stroke-width="1.2"/>

  <!-- Left column: Hero text -->
  <g transform="translate(72 70)">
    <g>
      <rect width="272" height="36" rx="18" fill="#062c42" stroke="#0e7490"/>
      <path d="M21 18H35M28 11V25" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
      <text x="48" y="24" class="mono eyebrow">MULTI-RUNTIME AGENT CONTRACTS</text>
    </g>

    <text x="0" y="124" class="sans title">HandoffKit</text>
    <text x="0" y="168" class="sans subtitle">Structured state transfer for</text>
    <text x="0" y="193" class="sans subtitle">multi-agent workflows.</text>
    <text x="0" y="225" class="sans body">Python · JavaScript · Rust · C++</text>
    <text x="0" y="247" class="sans body">Validate state. Trace decisions. Replay every run.</text>

    <!-- Terminal block -->
    <g transform="translate(0 276)" filter="url(#softShadow)">
      <rect width="448" height="164" rx="24" fill="#040915" stroke="#26364f"/>
      <rect x="1" y="1" width="446" height="42" rx="23" fill="#070b16" opacity="0.92"/>
      <circle cx="29" cy="22" r="6" fill="#fb7185"/>
      <circle cx="51" cy="22" r="6" fill="#facc15"/>
      <circle cx="73" cy="22" r="6" fill="#74d399"/>
      <text x="100" y="27" class="mono terminalDim">$ multi-runtime install</text>
      <text x="28" y="68" class="mono terminal" fill="#38bdf8">$ pip install handoffkit</text>
      <text x="28" y="92" class="mono terminal" fill="#facc15">$ npm install @handoffkit/core</text>
      <text x="28" y="116" class="mono terminal" fill="#f97316">$ cargo add handoffkit</text>
      <text x="28" y="140" class="mono terminal" fill="#a78bfa">  # C++: CMake FetchContent</text>
    </g>

    <!-- Language chips -->
    <g transform="translate(0 478)">
      <rect width="112" height="34" rx="17" fill="#0f1f35" stroke="#2563eb"/>
      <circle cx="18" cy="17" r="5" fill="#38bdf8"/>
      <text x="32" y="22" class="mono langTag" fill="#7dd3fc">Python</text>

      <rect x="122" width="118" height="34" rx="17" fill="#2a2000" stroke="#ca8a04"/>
      <circle cx="140" cy="17" r="5" fill="#facc15"/>
      <text x="154" y="22" class="mono langTag" fill="#fde68a">JavaScript</text>

      <rect x="250" width="92" height="34" rx="17" fill="#2a1200" stroke="#ea580c"/>
      <circle cx="268" cy="17" r="5" fill="#f97316"/>
      <text x="282" y="22" class="mono langTag" fill="#fed7aa">Rust</text>

      <rect x="352" width="78" height="34" rx="17" fill="#1e1030" stroke="#7c3aed"/>
      <circle cx="370" cy="17" r="5" fill="#a78bfa"/>
      <text x="384" y="22" class="mono langTag" fill="#ddd6fe">C++</text>
    </g>

    <g transform="translate(0 556)">
      <text x="0" y="0" class="mono terminalDim">HandoffState = task + decisions + files + errors + next_steps</text>
      <path d="M0 20H380" stroke="#26364f" stroke-width="1.3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Right panel: contract trace -->
  <g transform="translate(552 58)" filter="url(#shadow)">
    <rect width="690" height="602" rx="34" fill="url(#panelFill)" stroke="#334155" stroke-width="1.5"/>
    <rect x="26" y="26" width="638" height="74" rx="23" fill="#050816" stroke="#26364f"/>
    <text x="54" y="54" class="mono panelKicker">CONTRACT HANDOFF TRACE · CROSS-RUNTIME</text>
    <text x="54" y="78" class="mono terminal" font-size="13">Architect → Coder → Reviewer → Tester</text>
    <rect x="522" y="40" width="118" height="30" rx="15" fill="#052e16" stroke="#15803d"/>
    <text x="545" y="60" class="mono chipText">offline ✓</text>

    <!-- Agent flow nodes -->
    <g transform="translate(36 132)">
      <rect width="118" height="76" rx="20" fill="#071225" stroke="#38bdf8" stroke-width="2"/>
      <text x="20" y="32" class="sans nodeTitle">Architect</text>
      <text x="26" y="52" class="sans nodeSub">decides</text>
      <rect x="14" y="58" width="60" height="14" rx="7" fill="#062c42"/>
      <text x="20" y="69" class="mono" font-size="9" fill="#38bdf8">Python</text>

      <path d="M134 38H168" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

      <rect x="186" width="118" height="76" rx="20" fill="#071225" stroke="#34d399" stroke-width="2"/>
      <text x="206" y="32" class="sans nodeTitle">Coder</text>
      <text x="208" y="52" class="sans nodeSub">builds</text>
      <rect x="200" y="58" width="68" height="14" rx="7" fill="#022c1a"/>
      <text x="206" y="69" class="mono" font-size="9" fill="#34d399">JavaScript</text>

      <path d="M320 38H348" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

      <rect x="366" width="118" height="76" rx="20" fill="#071225" stroke="#a78bfa" stroke-width="2"/>
      <text x="386" y="32" class="sans nodeTitle">Reviewer</text>
      <text x="396" y="52" class="sans nodeSub">checks</text>
      <rect x="380" y="58" width="46" height="14" rx="7" fill="#1e1030"/>
      <text x="386" y="69" class="mono" font-size="9" fill="#a78bfa">Rust</text>

      <path d="M500 38H528" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

      <rect x="546" width="96" height="76" rx="20" fill="#071225" stroke="#f59e0b" stroke-width="2"/>
      <text x="566" y="32" class="sans nodeTitle">Tester</text>
      <text x="568" y="52" class="sans nodeSub">validates</text>
      <rect x="560" y="58" width="40" height="14" rx="7" fill="#1c1000"/>
      <text x="566" y="69" class="mono" font-size="9" fill="#f59e0b">C++</text>
    </g>

    <!-- HandoffState box -->
    <g transform="translate(36 244)">
      <rect width="618" height="198" rx="28" fill="#0a1322" stroke="url(#stateStroke)" stroke-width="2.8"/>
      <text x="30" y="44" class="sans panelTitle">HandoffState</text>
      <text x="30" y="70" class="sans panelSub">Shared wire format — snake_case JSON — readable by all 4 runtimes</text>

      <g transform="translate(30 140)">
        <rect width="112" height="34" rx="17" fill="#082f49" stroke="#0ea5e9"/>
        <circle cx="23" cy="17" r="5" fill="#38bdf8"/>
        <text x="43" y="22" class="mono chipText">files</text>

        <rect x="128" width="138" height="34" rx="17" fill="#172554" stroke="#2563eb"/>
        <circle cx="151" cy="17" r="5" fill="#60a5fa"/>
        <text x="170" y="22" class="mono chipText">decisions</text>

        <rect x="282" width="116" height="34" rx="17" fill="#2a1a05" stroke="#b45309"/>
        <circle cx="305" cy="17" r="5" fill="#f59e0b"/>
        <text x="325" y="22" class="mono chipText">errors</text>

        <rect x="414" width="138" height="34" rx="17" fill="#1e1030" stroke="#7c3aed"/>
        <circle cx="437" cy="17" r="5" fill="#a78bfa"/>
        <text x="455" y="22" class="mono chipText">next_steps</text>
      </g>

      <g transform="translate(468 26)">
        <rect width="120" height="34" rx="17" fill="#052e16" stroke="#15803d"/>
        <text x="24" y="22" class="mono chipText">validated</text>
        <rect y="44" width="120" height="34" rx="17" fill="#172554" stroke="#2563eb"/>
        <text x="28" y="66" class="mono chipText">quality A</text>
      </g>
    </g>

    <!-- Bottom metrics -->
    <g transform="translate(36 488)">
      <rect width="168" height="70" rx="22" fill="#050816" stroke="#26364f"/>
      <text x="24" y="34" class="sans metric">4 steps</text>
      <text x="24" y="54" class="mono metricLabel">RunTrace</text>

      <rect x="200" width="168" height="70" rx="22" fill="#050816" stroke="#26364f"/>
      <text x="224" y="34" class="sans metric">3 handoffs</text>
      <text x="224" y="54" class="mono metricLabel">ReplayRunner</text>

      <rect x="400" width="218" height="70" rx="22" fill="#050816" stroke="#26364f"/>
      <text x="424" y="34" class="sans metric">4 runtimes</text>
      <text x="424" y="54" class="mono metricLabel">Py · JS · Rust · C++</text>
    </g>
  </g>
</svg>
