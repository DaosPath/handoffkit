<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit hero</title>
  <desc id="desc">A clean product hero for HandoffKit showing structured state transfer between agents.</desc>
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.58" stop-color="#101827"/>
      <stop offset="1" stop-color="#0A111C"/>
    </linearGradient>
    <linearGradient id="accent" x1="112" y1="0" x2="1070" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-12%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .eyebrow { font: 700 16px Inter, ui-sans-serif, system-ui, sans-serif; fill: #93C5FD; letter-spacing: 0; }
      .titleText { font: 800 70px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .subtitle { font: 500 24px Inter, ui-sans-serif, system-ui, sans-serif; fill: #CBD5E1; letter-spacing: 0; }
      .mono { font: 700 18px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #E0F2FE; letter-spacing: 0; }
      .cardTitle { font: 750 22px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .cardBody { font: 500 16px Inter, ui-sans-serif, system-ui, sans-serif; fill: #CBD5E1; letter-spacing: 0; }
      .chip { font: 700 13px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #D1FAE5; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1200" height="560" rx="34" fill="url(#heroBg)"/>
  <rect x="1.5" y="1.5" width="1197" height="557" rx="32.5" stroke="#334155" stroke-width="3"/>
  <path d="M96 102H374" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>

  <text x="96" y="152" class="eyebrow">OPEN-SOURCE PYTHON FRAMEWORK</text>
  <text x="92" y="232" class="titleText">HandoffKit</text>
  <text x="96" y="282" class="subtitle">Structured state transfer for</text>
  <text x="96" y="316" class="subtitle">multi-agent Python workflows.</text>
  <text x="96" y="350" class="subtitle">Validate, trace, and replay each run.</text>

  <rect x="96" y="386" width="348" height="64" rx="14" fill="#020617" stroke="#334155" stroke-width="1.5"/>
  <text x="124" y="426" class="mono">pip install handoffkit</text>

  <g transform="translate(96 482)">
    <rect x="0" y="0" width="112" height="34" rx="17" fill="#0F172A" stroke="#1E293B"/>
    <text x="23" y="22" class="chip">Python</text>
    <rect x="126" y="0" width="118" height="34" rx="17" fill="#0F172A" stroke="#1E293B"/>
    <text x="148" y="22" class="chip">No deps</text>
    <rect x="258" y="0" width="126" height="34" rx="17" fill="#0F172A" stroke="#1E293B"/>
    <text x="282" y="22" class="chip">3.10-3.14</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="548" y="86" width="560" height="390" rx="28" fill="#0F172A" stroke="#334155" stroke-width="2"/>

    <rect x="588" y="128" width="156" height="86" rx="18" fill="#111C2E" stroke="#38BDF8" stroke-width="2"/>
    <text x="619" y="164" class="cardTitle">Architect</text>
    <text x="620" y="192" class="cardBody">plans</text>

    <rect x="858" y="128" width="156" height="86" rx="18" fill="#17172D" stroke="#8B5CF6" stroke-width="2"/>
    <text x="904" y="164" class="cardTitle">Coder</text>
    <text x="899" y="192" class="cardBody">builds</text>

    <rect x="858" y="374" width="156" height="78" rx="18" fill="#10251B" stroke="#22C55E" stroke-width="2"/>
    <text x="904" y="406" class="cardTitle">Tester</text>
    <text x="894" y="430" class="cardBody">checks</text>

    <rect x="616" y="246" width="330" height="104" rx="22" fill="#111827" stroke="url(#accent)" stroke-width="2.5"/>
    <text x="657" y="284" class="cardTitle">HandoffState</text>
    <text x="657" y="315" class="cardBody">task · decisions · files · errors</text>
    <text x="657" y="340" class="cardBody">next steps · metadata · schema</text>

    <path d="M744 171H858" stroke="#94A3B8" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M846 159L860 171L846 183" stroke="#94A3B8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M936 214V246" stroke="#94A3B8" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M924 234L936 248L948 234" stroke="#94A3B8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M936 350V374" stroke="#94A3B8" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M924 362L936 376L948 362" stroke="#94A3B8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="588" y="392" width="208" height="44" rx="14" fill="#020617" stroke="#334155"/>
    <text x="612" y="420" class="mono">RunTrace + Replay</text>
  </g>
</svg>
