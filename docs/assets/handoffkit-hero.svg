<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit hero</title>
  <desc id="desc">HandoffKit hero graphic showing structured state transfer, validation, quality scoring, tracing, and replay for multi-agent workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06121f"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#112018"/>
    </linearGradient>
    <linearGradient id="accent" x1="92" y1="0" x2="1188" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.34" stop-color="#34d399"/>
      <stop offset="0.68" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="125%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .eyebrow { fill: #7dd3fc; font-size: 14px; font-weight: 820; letter-spacing: 0; }
      .title { fill: #f8fafc; font-size: 72px; font-weight: 860; letter-spacing: 0; }
      .subtitle { fill: #cbd5e1; font-size: 24px; font-weight: 520; letter-spacing: 0; }
      .monoText { fill: #d1fae5; font-size: 18px; font-weight: 740; letter-spacing: 0; }
      .cardTitle { fill: #f8fafc; font-size: 20px; font-weight: 800; letter-spacing: 0; }
      .cardBody { fill: #cbd5e1; font-size: 15px; font-weight: 540; letter-spacing: 0; }
      .chip { fill: #dbeafe; font-size: 12px; font-weight: 780; letter-spacing: 0; }
      .panel { fill: #0f172a; stroke: #2b3850; stroke-width: 1.2; }
      .node { fill: #111827; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1280" height="620" rx="38" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1277" height="617" rx="36.5" fill="none" stroke="#2b3850" stroke-width="3"/>
  <path d="M92 122H1188" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>

  <g transform="translate(92 70)">
    <rect width="236" height="34" rx="17" fill="#082f49" stroke="#075985"/>
    <text x="19" y="23" class="mono eyebrow">PYTHON AGENT CONTRACTS</text>
    <text x="0" y="120" class="sans title">HandoffKit</text>
    <text x="2" y="164" class="sans subtitle">Structured state transfer for multi-agent</text>
    <text x="2" y="198" class="sans subtitle">Python workflows. Validate, trace, replay.</text>

    <g transform="translate(0 242)">
      <rect width="384" height="66" rx="18" fill="#020617" stroke="#2b3850"/>
      <text x="28" y="42" class="mono monoText">pip install handoffkit</text>
    </g>
    <g transform="translate(0 338)">
      <rect width="120" height="34" rx="17" fill="#0f1f35" stroke="#1e3a8a"/><text x="25" y="22" class="mono chip">3.10-3.14</text>
      <rect x="136" width="120" height="34" rx="17" fill="#0b2a1a" stroke="#166534"/><text x="167" y="22" class="mono chip">offline</text>
      <rect x="272" width="120" height="34" rx="17" fill="#2a1a05" stroke="#92400e"/><text x="301" y="22" class="mono chip">replay</text>
    </g>
  </g>

  <g transform="translate(548 92)" filter="url(#shadow)">
    <rect width="640" height="430" rx="30" class="panel"/>
    <rect x="30" y="32" width="580" height="54" rx="18" fill="#020617" stroke="#25324a"/>
    <text x="56" y="66" class="mono cardBody">RunTrace: Architect -> Coder -> Reviewer -> Tester</text>

    <g transform="translate(58 128)">
      <rect width="150" height="74" rx="18" class="node" stroke="#38bdf8"/>
      <text x="34" y="34" class="sans cardTitle">Architect</text>
      <text x="42" y="57" class="sans cardBody">decides</text>
    </g>
    <path d="M216 165H276" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <path d="M264 153L278 165L264 177" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(286 128)">
      <rect width="150" height="74" rx="18" class="node" stroke="#34d399"/>
      <text x="48" y="34" class="sans cardTitle">Coder</text>
      <text x="50" y="57" class="sans cardBody">builds</text>
    </g>
    <path d="M444 165H504" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <path d="M492 153L506 165L492 177" stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(514 128)">
      <rect width="68" height="74" rx="18" class="node" stroke="#f59e0b"/>
      <text x="16" y="34" class="sans cardTitle">QA</text>
      <text x="15" y="57" class="sans cardBody">tests</text>
    </g>

    <g transform="translate(58 242)">
      <rect width="524" height="112" rx="22" fill="#111827" stroke="url(#accent)" stroke-width="2.5"/>
      <text x="28" y="40" class="sans cardTitle">HandoffState</text>
      <text x="28" y="70" class="sans cardBody">task | decisions | files | errors | next_steps | metadata</text>
      <rect x="354" y="28" width="136" height="34" rx="17" fill="#052e16" stroke="#166534"/>
      <text x="385" y="50" class="mono chip" fill="#bbf7d0">validated</text>
      <rect x="354" y="70" width="136" height="28" rx="14" fill="#172554" stroke="#1d4ed8"/>
      <text x="388" y="89" class="mono chip">quality A</text>
    </g>

    <g transform="translate(58 382)">
      <rect width="160" height="34" rx="17" fill="#020617" stroke="#2b3850"/>
      <text x="28" y="22" class="mono chip">RunTrace</text>
      <rect x="182" width="160" height="34" rx="17" fill="#020617" stroke="#2b3850"/>
      <text x="208" y="22" class="mono chip">ReplayRunner</text>
      <rect x="364" width="160" height="34" rx="17" fill="#020617" stroke="#2b3850"/>
      <text x="392" y="22" class="mono chip">Reports</text>
    </g>
  </g>
</svg>
