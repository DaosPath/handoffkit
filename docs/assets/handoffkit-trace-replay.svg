<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-labelledby="title desc">
  <title id="title">Trace, store, replay, and report</title>
  <desc id="desc">A four-stage HandoffKit observability pipeline from RunTrace through storage and replay to JSON and Markdown reports.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060913"/>
      <stop offset="0.55" stop-color="#0a1120"/>
      <stop offset="1" stop-color="#09170f"/>
    </linearGradient>
    <linearGradient id="accent" x1="108" y1="0" x2="1172" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.34" stop-color="#4ade80"/>
      <stop offset="0.68" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#21304a" stroke-opacity="0.28"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="134%">
      <feDropShadow dx="0" dy="15" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="480" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="480" rx="28" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="1277" height="477" rx="26.5" fill="none" stroke="#22304a" stroke-width="3"/>

  <text x="68" y="60" class="sans" font-size="31" font-weight="850" fill="#f8fafc">Trace once. Replay without side effects.</text>
  <text x="68" y="88" class="sans" font-size="15" fill="#8fa4c0">Turn a completed workflow into durable evidence, a timeline, and portable reports.</text>

  <line x1="118" y1="248" x2="1162" y2="248" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.75"/>

  <g transform="translate(68 126)" filter="url(#shadow)">
    <rect width="232" height="236" rx="21" fill="#0b1424" stroke="#24506d" stroke-width="1.5"/>
    <rect width="232" height="6" rx="3" fill="#38bdf8"/>
    <rect x="20" y="22" width="50" height="26" rx="13" fill="#0d2234"/>
    <text x="35" y="40" class="mono" font-size="10" font-weight="800" fill="#7dd3fc">01</text>
    <text x="20" y="88" class="sans" font-size="22" font-weight="850" fill="#f8fafc">RunTrace</text>
    <text x="20" y="114" class="sans" font-size="13" fill="#8fa4c0">Capture the completed run.</text>
    <g transform="translate(20 136)">
      <rect width="192" height="64" rx="14" fill="#070c15" stroke="#22304a"/>
      <text x="16" y="24" class="mono" font-size="10" fill="#7dd3fc">steps · handoffs · events</text>
      <text x="16" y="43" class="mono" font-size="10" fill="#7dd3fc">tool results · final output</text>
    </g>
    <text x="20" y="220" class="mono" font-size="10" font-weight="700" fill="#64748b">immutable evidence model</text>
  </g>

  <path d="M310 248H338" stroke="#43546e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M330 240L340 248L330 256" fill="none" stroke="#43546e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(350 126)" filter="url(#shadow)">
    <rect width="232" height="236" rx="21" fill="#0b1424" stroke="#286442" stroke-width="1.5"/>
    <rect width="232" height="6" rx="3" fill="#4ade80"/>
    <rect x="20" y="22" width="50" height="26" rx="13" fill="#0b2b1c"/>
    <text x="35" y="40" class="mono" font-size="10" font-weight="800" fill="#86efac">02</text>
    <text x="20" y="88" class="sans" font-size="22" font-weight="850" fill="#f8fafc">Store</text>
    <text x="20" y="114" class="sans" font-size="13" fill="#8fa4c0">Persist the trace safely.</text>
    <g transform="translate(20 136)">
      <rect width="192" height="64" rx="14" fill="#070c15" stroke="#22304a"/>
      <text x="16" y="24" class="mono" font-size="10" fill="#86efac">FileTraceStore("runs")</text>
      <text x="16" y="43" class="mono" font-size="10" fill="#86efac">runs/&lt;id&gt;/trace.json</text>
    </g>
    <text x="20" y="220" class="mono" font-size="10" font-weight="700" fill="#64748b">durable audit history</text>
  </g>

  <path d="M592 248H620" stroke="#43546e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M612 240L622 248L612 256" fill="none" stroke="#43546e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(632 126)" filter="url(#shadow)">
    <rect width="232" height="236" rx="21" fill="#0b1424" stroke="#6a421f" stroke-width="1.5"/>
    <rect width="232" height="6" rx="3" fill="#fb923c"/>
    <rect x="20" y="22" width="50" height="26" rx="13" fill="#27150b"/>
    <text x="35" y="40" class="mono" font-size="10" font-weight="800" fill="#fdba74">03</text>
    <text x="20" y="88" class="sans" font-size="22" font-weight="850" fill="#f8fafc">Replay</text>
    <text x="20" y="114" class="sans" font-size="13" fill="#8fa4c0">Inspect without re-running.</text>
    <g transform="translate(20 136)">
      <rect width="192" height="64" rx="14" fill="#070c15" stroke="#22304a"/>
      <text x="16" y="24" class="mono" font-size="10" fill="#fdba74">ReplayRunner(trace)</text>
      <text x="16" y="43" class="mono" font-size="10" fill="#fdba74">summary · to_timeline()</text>
    </g>
    <text x="20" y="220" class="mono" font-size="10" font-weight="700" fill="#64748b">zero provider or tool calls</text>
  </g>

  <path d="M874 248H902" stroke="#43546e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M894 240L904 248L894 256" fill="none" stroke="#43546e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(914 126)" filter="url(#shadow)">
    <rect width="298" height="236" rx="21" fill="#0b1424" stroke="#554178" stroke-width="1.5"/>
    <rect width="298" height="6" rx="3" fill="#a78bfa"/>
    <rect x="20" y="22" width="50" height="26" rx="13" fill="#22143d"/>
    <text x="35" y="40" class="mono" font-size="10" font-weight="800" fill="#c4b5fd">04</text>
    <text x="20" y="88" class="sans" font-size="22" font-weight="850" fill="#f8fafc">Report</text>
    <text x="20" y="114" class="sans" font-size="13" fill="#8fa4c0">Export evidence for humans and systems.</text>
    <g transform="translate(20 136)">
      <rect width="258" height="64" rx="14" fill="#070c15" stroke="#22304a"/>
      <text x="16" y="24" class="mono" font-size="10" fill="#c4b5fd">report.json · report.md</text>
      <text x="16" y="43" class="mono" font-size="10" fill="#c4b5fd">validation · quality · timeline</text>
    </g>
    <text x="20" y="220" class="mono" font-size="10" font-weight="700" fill="#64748b">portable and reviewable</text>
  </g>

  <g transform="translate(68 394)">
    <rect width="1144" height="48" rx="16" fill="#050a13" stroke="#22304a"/>
    <text x="22" y="29" class="mono" font-size="11" font-weight="700" fill="#4ade80">ReplaySummary</text>
    <text x="136" y="29" class="mono" font-size="11" fill="#8fa4c0">step_count · handoff_count · tool_result_count · success · final_output</text>
    <text x="918" y="29" class="mono" font-size="10" font-weight="700" fill="#c4b5fd">JSON + Markdown</text>
  </g>
</svg>
