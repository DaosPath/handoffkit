<svg width="1280" height="460" viewBox="0 0 1280 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit trace and replay — cross-runtime</title>
  <desc id="desc">Trace and replay pipeline showing RunTrace, FileTraceStore, ReplayRunner, and report output — available in Python, JavaScript, Rust, and C++.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="pipe" x1="120" y1="230" x2="1160" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.33" stop-color="#facc15"/>
      <stop offset="0.66" stop-color="#f97316"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <style>
      .heading { font: 800 36px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; }
      .sub { font: 500 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #CBD5E1; }
      .label { font: 800 20px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; }
      .body { font: 500 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #CBD5E1; }
      .mono { font: 700 13px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #BAE6FD; }
      .langTag { font: 800 10px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="460" rx="30" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1277" height="457" rx="28.5" stroke="#334155" stroke-width="3"/>

  <text x="70" y="72" class="heading">Trace once. Replay safely. Export anywhere.</text>
  <text x="70" y="104" class="sub">RunTrace works across Python, JavaScript, Rust, and C++. Replay reads evidence — zero side effects.</text>

  <!-- Pipeline line -->
  <path d="M170 236H1110" stroke="url(#pipe)" stroke-width="8" stroke-linecap="round"/>

  <!-- Node 1: RunTrace -->
  <rect x="72" y="168" width="198" height="148" rx="24" fill="#0F172A" stroke="#38BDF8" stroke-width="2"/>
  <rect x="110" y="134" width="122" height="46" rx="16" fill="#0B1220" stroke="#38BDF8" stroke-width="2"/>
  <text x="148" y="162" class="mono">01</text>
  <text x="110" y="216" class="label">RunTrace</text>
  <text x="106" y="244" class="body">steps, handoffs,</text>
  <text x="110" y="266" class="body">tool results</text>
  <!-- Runtime badges -->
  <g transform="translate(88 284)">
    <rect width="42" height="18" rx="9" fill="#0e3050"/>
    <text x="6" y="13" class="langTag" fill="#38bdf8">Py</text>
    <rect x="48" width="42" height="18" rx="9" fill="#2a2000"/>
    <text x="54" y="13" class="langTag" fill="#facc15">JS</text>
    <rect x="96" width="42" height="18" rx="9" fill="#2a1200"/>
    <text x="102" y="13" class="langTag" fill="#f97316">Rs</text>
    <rect x="144" width="42" height="18" rx="9" fill="#1e1030"/>
    <text x="149" y="13" class="langTag" fill="#a78bfa">C++</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M282 236H338" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  <path d="M326 224L340 236L326 248" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Node 2: TraceStore -->
  <rect x="352" y="168" width="198" height="148" rx="24" fill="#0F172A" stroke="#facc15" stroke-width="2"/>
  <rect x="390" y="134" width="122" height="46" rx="16" fill="#0B1220" stroke="#facc15" stroke-width="2"/>
  <text x="428" y="162" class="mono">02</text>
  <text x="373" y="216" class="label">TraceStore</text>
  <text x="390" y="244" class="mono">traces/*.json</text>
  <text x="390" y="266" class="body">durable audit</text>
  <g transform="translate(368 284)">
    <rect width="42" height="18" rx="9" fill="#0e3050"/>
    <text x="6" y="13" class="langTag" fill="#38bdf8">Py</text>
    <rect x="48" width="42" height="18" rx="9" fill="#2a2000"/>
    <text x="54" y="13" class="langTag" fill="#facc15">JS</text>
    <rect x="96" width="42" height="18" rx="9" fill="#2a1200"/>
    <text x="102" y="13" class="langTag" fill="#f97316">Rs</text>
    <rect x="144" width="42" height="18" rx="9" fill="#1e1030"/>
    <text x="149" y="13" class="langTag" fill="#a78bfa">C++</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M562 236H618" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  <path d="M606 224L620 236L606 248" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Node 3: Timeline -->
  <rect x="632" y="168" width="198" height="148" rx="24" fill="#0F172A" stroke="#f97316" stroke-width="2"/>
  <rect x="670" y="134" width="122" height="46" rx="16" fill="#0B1220" stroke="#f97316" stroke-width="2"/>
  <text x="708" y="162" class="mono">03</text>
  <text x="658" y="216" class="label">Timeline</text>
  <text x="660" y="244" class="body">to_timeline()</text>
  <text x="660" y="266" class="body">toTimeline() JS</text>
  <g transform="translate(648 284)">
    <rect width="42" height="18" rx="9" fill="#0e3050"/>
    <text x="6" y="13" class="langTag" fill="#38bdf8">Py</text>
    <rect x="48" width="42" height="18" rx="9" fill="#2a2000"/>
    <text x="54" y="13" class="langTag" fill="#facc15">JS</text>
    <rect x="96" width="42" height="18" rx="9" fill="#2a1200"/>
    <text x="102" y="13" class="langTag" fill="#f97316">Rs</text>
    <rect x="144" width="42" height="18" rx="9" fill="#1e1030"/>
    <text x="149" y="13" class="langTag" fill="#a78bfa">C++</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M842 236H898" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  <path d="M886 224L900 236L886 248" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Node 4: Reports -->
  <rect x="912" y="168" width="198" height="148" rx="24" fill="#0F172A" stroke="#22C55E" stroke-width="2"/>
  <rect x="950" y="134" width="122" height="46" rx="16" fill="#0B1220" stroke="#22C55E" stroke-width="2"/>
  <text x="998" y="162" class="mono">04</text>
  <text x="960" y="216" class="label">Reports</text>
  <text x="966" y="244" class="mono">JSON</text>
  <text x="948" y="266" class="mono">Markdown</text>
  <g transform="translate(928 284)">
    <rect width="42" height="18" rx="9" fill="#0e3050"/>
    <text x="6" y="13" class="langTag" fill="#38bdf8">Py</text>
    <rect x="48" width="42" height="18" rx="9" fill="#2a2000"/>
    <text x="54" y="13" class="langTag" fill="#facc15">JS</text>
    <rect x="96" width="42" height="18" rx="9" fill="#2a1200"/>
    <text x="102" y="13" class="langTag" fill="#f97316">Rs</text>
    <rect x="144" width="42" height="18" rx="9" fill="#1e1030"/>
    <text x="149" y="13" class="langTag" fill="#a78bfa">C++</text>
  </g>

  <!-- Bottom bar -->
  <rect x="70" y="374" width="1140" height="50" rx="18" fill="#020617" stroke="#1E293B"/>
  <text x="96" y="403" class="mono">ReplaySummary = step_count + handoff_count + tool_result_count + final_output</text>
  <text x="96" y="417" class="mono" font-size="11" fill="#64748b">· Available in Python, JavaScript, Rust, C++ · Shared JSON wire format ·</text>
</svg>
