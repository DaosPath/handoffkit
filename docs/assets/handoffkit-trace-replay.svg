<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit trace and replay</title>
  <desc id="desc">A diagram showing RunTrace storage and replay inspection without re-running providers or tools.</desc>
  <defs>
    <linearGradient id="accent" x1="102" y1="178" x2="1100" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.48" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <style>
      .heading { font: 800 34px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .label { font: 750 22px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .body { font: 500 16px Inter, ui-sans-serif, system-ui, sans-serif; fill: #CBD5E1; letter-spacing: 0; }
      .mono { font: 600 14px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #BAE6FD; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="1200" height="360" rx="28" fill="#0F172A"/>
  <rect x="1" y="1" width="1198" height="358" rx="27" stroke="#334155" stroke-width="2"/>
  <text x="64" y="72" class="heading">Trace once. Replay without side effects.</text>

  <g>
    <rect x="70" y="126" width="210" height="132" rx="18" fill="#111827" stroke="#38BDF8"/>
    <text x="110" y="166" class="label">RunTrace</text>
    <text x="104" y="198" class="mono">steps</text>
    <text x="104" y="222" class="mono">handoffs</text>
    <text x="104" y="246" class="mono">tool_results</text>
  </g>

  <g>
    <rect x="370" y="126" width="210" height="132" rx="18" fill="#111827" stroke="#A78BFA"/>
    <text x="417" y="166" class="label">FileTraceStore</text>
    <text x="427" y="202" class="mono">traces/*.json</text>
    <text x="420" y="232" class="body">durable evidence</text>
  </g>

  <g>
    <rect x="670" y="126" width="210" height="132" rx="18" fill="#111827" stroke="#34D399"/>
    <text x="717" y="166" class="label">ReplayRunner</text>
    <text x="718" y="202" class="mono">no providers</text>
    <text x="739" y="226" class="mono">no tools</text>
  </g>

  <g>
    <rect x="970" y="126" width="160" height="132" rx="18" fill="#111827" stroke="#64748B"/>
    <text x="1009" y="166" class="label">Reports</text>
    <text x="1011" y="202" class="mono">JSON</text>
    <text x="1002" y="226" class="mono">Markdown</text>
  </g>

  <path d="M280 192H370" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M358 180L372 192L358 204" stroke="#A78BFA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M580 192H670" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M658 180L672 192L658 204" stroke="#34D399" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M880 192H970" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M958 180L972 192L958 204" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="70" y="304" class="body">Replay is inspection only. It never re-runs shell commands, tools, or external model calls.</text>
</svg>
