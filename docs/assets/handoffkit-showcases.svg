<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="660" viewBox="0 0 1280 660" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit workflow showcases</title>
  <desc id="desc">Three evidence-producing workflows for coding agents, support escalation, and research.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060913"/>
      <stop offset="0.55" stop-color="#0a1120"/>
      <stop offset="1" stop-color="#09170f"/>
    </linearGradient>
    <linearGradient id="accent" x1="68" y1="0" x2="1212" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.34" stop-color="#4ade80"/>
      <stop offset="0.68" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#21304a" stroke-opacity="0.28"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="132%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="660" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="660" rx="30" fill="url(#grid)"/>
  <rect x="1.5" y="1.5" width="1277" height="657" rx="28.5" fill="none" stroke="#22304a" stroke-width="3"/>

  <rect x="68" y="44" width="166" height="30" rx="15" fill="#0d2234" stroke="#155e75"/>
  <text x="88" y="64" class="mono" font-size="10" font-weight="800" fill="#7dd3fc">EVIDENCE-PRODUCING DEMOS</text>
  <text x="68" y="112" class="sans" font-size="40" font-weight="850" fill="#f8fafc">Three workflows. One contract.</text>
  <text x="68" y="142" class="sans" font-size="15" fill="#8fa4c0">Different domains, the same structured handoff, validation, trace, and report model.</text>
  <rect x="68" y="164" width="1144" height="4" rx="2" fill="url(#accent)"/>

  <g transform="translate(68 198)" filter="url(#shadow)">
    <rect width="354" height="378" rx="22" fill="#0b1424" stroke="#24506d" stroke-width="1.5"/>
    <rect width="354" height="6" rx="3" fill="#38bdf8"/>
    <rect x="24" y="24" width="92" height="28" rx="14" fill="#0d2234"/>
    <text x="42" y="43" class="mono" font-size="10" font-weight="800" fill="#7dd3fc">ENGINEERING</text>
    <text x="24" y="92" class="sans" font-size="23" font-weight="850" fill="#f8fafc">Coding agents</text>
    <text x="24" y="118" class="sans" font-size="13" fill="#8fa4c0">Architect → Coder → Reviewer → Tester</text>

    <g transform="translate(24 144)">
      <rect width="306" height="78" rx="15" fill="#070c15" stroke="#22304a"/>
      <text x="18" y="28" class="sans" font-size="13" font-weight="700" fill="#e2e8f0">Keeps attached</text>
      <text x="18" y="51" class="mono" font-size="10" fill="#7dd3fc">files · decisions · review findings</text>
      <text x="18" y="67" class="mono" font-size="10" fill="#7dd3fc">commands · tests · next steps</text>
    </g>

    <g transform="translate(24 238)">
      <rect width="92" height="30" rx="15" fill="#0b2b1c" stroke="#166534"/>
      <text x="18" y="20" class="mono" font-size="10" font-weight="800" fill="#86efac">validated</text>
      <rect x="102" width="90" height="30" rx="15" fill="#0d2234" stroke="#155e75"/>
      <text x="120" y="20" class="mono" font-size="10" font-weight="800" fill="#7dd3fc">quality A</text>
      <rect x="202" width="104" height="30" rx="15" fill="#22143d" stroke="#7c3aed"/>
      <text x="220" y="20" class="mono" font-size="10" font-weight="800" fill="#c4b5fd">replayable</text>
    </g>

    <rect x="24" y="290" width="306" height="56" rx="14" fill="#050a13" stroke="#22304a"/>
    <text x="42" y="314" class="mono" font-size="10" fill="#64748b">run</text>
    <text x="42" y="334" class="mono" font-size="11" font-weight="700" fill="#38bdf8">handoffkit showcase coding-review</text>
  </g>

  <g transform="translate(463 198)" filter="url(#shadow)">
    <rect width="354" height="378" rx="22" fill="#0b1424" stroke="#5f3d1e" stroke-width="1.5"/>
    <rect width="354" height="6" rx="3" fill="#fb923c"/>
    <rect x="24" y="24" width="86" height="28" rx="14" fill="#27150b"/>
    <text x="42" y="43" class="mono" font-size="10" font-weight="800" fill="#fdba74">OPERATIONS</text>
    <text x="24" y="92" class="sans" font-size="23" font-weight="850" fill="#f8fafc">Support escalation</text>
    <text x="24" y="118" class="sans" font-size="13" fill="#8fa4c0">Triage → Billing → Refund → Supervisor</text>

    <g transform="translate(24 144)">
      <rect width="306" height="78" rx="15" fill="#070c15" stroke="#22304a"/>
      <text x="18" y="28" class="sans" font-size="13" font-weight="700" fill="#e2e8f0">Keeps attached</text>
      <text x="18" y="51" class="mono" font-size="10" fill="#fdba74">charge IDs · policy checks · reasons</text>
      <text x="18" y="67" class="mono" font-size="10" fill="#fdba74">approvals · escalation context</text>
    </g>

    <g transform="translate(24 238)">
      <rect width="92" height="30" rx="15" fill="#0b2b1c" stroke="#166534"/>
      <text x="18" y="20" class="mono" font-size="10" font-weight="800" fill="#86efac">validated</text>
      <rect x="102" width="90" height="30" rx="15" fill="#27150b" stroke="#c2410c"/>
      <text x="120" y="20" class="mono" font-size="10" font-weight="800" fill="#fdba74">audit trail</text>
      <rect x="202" width="104" height="30" rx="15" fill="#22143d" stroke="#7c3aed"/>
      <text x="220" y="20" class="mono" font-size="10" font-weight="800" fill="#c4b5fd">replayable</text>
    </g>

    <rect x="24" y="290" width="306" height="56" rx="14" fill="#050a13" stroke="#22304a"/>
    <text x="42" y="314" class="mono" font-size="10" fill="#64748b">run</text>
    <text x="42" y="334" class="mono" font-size="11" font-weight="700" fill="#fb923c">handoffkit showcase support-escalation</text>
  </g>

  <g transform="translate(858 198)" filter="url(#shadow)">
    <rect width="354" height="378" rx="22" fill="#0b1424" stroke="#4f3a70" stroke-width="1.5"/>
    <rect width="354" height="6" rx="3" fill="#a78bfa"/>
    <rect x="24" y="24" width="84" height="28" rx="14" fill="#22143d"/>
    <text x="42" y="43" class="mono" font-size="10" font-weight="800" fill="#c4b5fd">RESEARCH</text>
    <text x="24" y="92" class="sans" font-size="23" font-weight="850" fill="#f8fafc">Research workflow</text>
    <text x="24" y="118" class="sans" font-size="13" fill="#8fa4c0">Researcher → Extractor → Checker → Writer</text>

    <g transform="translate(24 144)">
      <rect width="306" height="78" rx="15" fill="#070c15" stroke="#22304a"/>
      <text x="18" y="28" class="sans" font-size="13" font-weight="700" fill="#e2e8f0">Keeps attached</text>
      <text x="18" y="51" class="mono" font-size="10" fill="#c4b5fd">sources · claims · confidence</text>
      <text x="18" y="67" class="mono" font-size="10" fill="#c4b5fd">corrections · citations · constraints</text>
    </g>

    <g transform="translate(24 238)">
      <rect width="92" height="30" rx="15" fill="#0b2b1c" stroke="#166534"/>
      <text x="18" y="20" class="mono" font-size="10" font-weight="800" fill="#86efac">validated</text>
      <rect x="102" width="90" height="30" rx="15" fill="#22143d" stroke="#7c3aed"/>
      <text x="120" y="20" class="mono" font-size="10" font-weight="800" fill="#c4b5fd">citations</text>
      <rect x="202" width="104" height="30" rx="15" fill="#0d2234" stroke="#155e75"/>
      <text x="220" y="20" class="mono" font-size="10" font-weight="800" fill="#7dd3fc">traceable</text>
    </g>

    <rect x="24" y="290" width="306" height="56" rx="14" fill="#050a13" stroke="#22304a"/>
    <text x="42" y="314" class="mono" font-size="10" fill="#64748b">run</text>
    <text x="42" y="334" class="mono" font-size="11" font-weight="700" fill="#a78bfa">handoffkit showcase research-workflow</text>
  </g>

  <g transform="translate(68 600)">
    <rect width="1144" height="36" rx="18" fill="#050a13" stroke="#22304a"/>
    <circle cx="22" cy="18" r="4" fill="#fb7185"/>
    <circle cx="38" cy="18" r="4" fill="#facc15"/>
    <circle cx="54" cy="18" r="4" fill="#4ade80"/>
    <text x="78" y="23" class="mono" font-size="10" fill="#8fa4c0">same wire contract · validation · quality · RunTrace · JSON + Markdown reports</text>
  </g>
</svg>
