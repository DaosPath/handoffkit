<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit showcases — multi-runtime</title>
  <desc id="desc">Three HandoffKit demos: coding agents, support escalation, and research workflow across Python, JavaScript, Rust, and C++.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fbff"/>
      <stop offset="0.5" stop-color="#edf6ff"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="hdrBarH" x1="68" y1="0" x2="1212" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.33" stop-color="#059669"/>
      <stop offset="0.66" stop-color="#ea580c"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Card top stripes -->
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#059669"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#be123c"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#0891b2"/></linearGradient>
    <filter id="card" x="-4%" y="-3%" width="108%" height="110%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="term" x="-3%" y="-6%" width="106%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .f { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .m { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="780" rx="32" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1277" height="777" rx="30.5" fill="none" stroke="#cbd5e1" stroke-width="3"/>

  <!-- Deco blobs -->
  <circle cx="1180" cy="84" r="96" fill="#bbf7d0" fill-opacity="0.32"/>
  <circle cx="1068" cy="62" r="62" fill="#bfdbfe" fill-opacity="0.32"/>

  <!-- ─── HEADER ─── -->
  <rect x="68" y="48" width="208" height="28" rx="14" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1"/>
  <text x="84" y="67" class="m" font-size="11" font-weight="800" fill="#1d4ed8">REAL DEMOS · 4 RUNTIMES</text>

  <text x="68" y="120" class="f" font-size="42" font-weight="840" fill="#0f172a">Three demos, one contract</text>
  <text x="68" y="150" class="f" font-size="16" font-weight="500" fill="#42526b">Context soup becomes validation, quality scores, replay, and next steps</text>
  <text x="68" y="172" class="f" font-size="16" font-weight="500" fill="#42526b">across Python, JavaScript, Rust, and C++.</text>

  <!-- Gradient rule -->
  <rect x="68" y="190" width="1144" height="4" rx="2" fill="url(#hdrBarH)"/>

  <!-- Terminal top-right: x=792 w=420 → right=1212. margin=68 ✓ -->
  <g transform="translate(792 44)" filter="url(#term)">
    <rect width="420" height="110" rx="18" fill="#0f1220"/>
    <circle cx="24" cy="24" r="5" fill="#fb7185"/>
    <circle cx="42" cy="24" r="5" fill="#facc15"/>
    <circle cx="60" cy="24" r="5" fill="#4ade80"/>
    <line x1="16" y1="42" x2="404" y2="42" stroke="#1e293b" stroke-width="1"/>
    <text x="24" y="72" class="m" font-size="14" font-weight="700" fill="#dbeafe">$ handoffkit init coding-review</text>
    <text x="24" y="96" class="m" font-size="14" font-weight="700" fill="#dbeafe">$ handoffkit report runs/latest</text>
  </g>

  <!-- ═══════════════════════════════════════════
       3 CARDS  x=68,444,820  w=356  right=1176
       Card height = 510  → bottom = 718
       ═══════════════════════════════════════════ -->

  <!-- ── CARD 1: Coding agents ── -->
  <g transform="translate(68 208)" filter="url(#card)">
    <rect width="356" height="510" rx="24" fill="#ffffff" stroke="#e2eaf4" stroke-width="1.2"/>
    <rect width="356" height="7" rx="3.5" fill="url(#g1)"/>

    <!-- Title block -->
    <text x="24" y="50" class="f" font-size="22" font-weight="820" fill="#0f172a">Coding agents</text>
    <text x="24" y="72" class="f" font-size="13" fill="#42526b">Architect, coder, reviewer, and tester</text>
    <text x="24" y="90" class="f" font-size="13" fill="#42526b">share one structured project handoff.</text>

    <!-- Divider -->
    <line x1="24" y1="106" x2="332" y2="106" stroke="#f1f5f9" stroke-width="1.5"/>

    <!-- Agent grid 2×2 — starts y=118, each agent h=56 row-gap=10 col-gap=14
         Col1 x=24 w=144, Col2 x=188 w=144, total=24+144+14+144+24=350 ✓ -->
    <!-- Row 1 -->
    <rect x="24" y="118" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="42" cy="140" r="8" fill="#2563eb"/>
    <text x="58" y="137" class="f" font-size="12" font-weight="780" fill="#0f172a">Architect</text>
    <rect x="56" y="148" width="52" height="18" rx="9" fill="#dbeafe"/>
    <text x="62" y="161" class="m" font-size="10" font-weight="800" fill="#1d4ed8">Python</text>

    <!-- Arrow row 1 -->
    <text x="172" y="148" class="f" font-size="18" fill="#94a3b8">→</text>

    <rect x="188" y="118" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="206" cy="140" r="8" fill="#0891b2"/>
    <text x="222" y="137" class="f" font-size="12" font-weight="780" fill="#0f172a">Coder</text>
    <rect x="220" y="148" width="70" height="18" rx="9" fill="#cffafe"/>
    <text x="226" y="161" class="m" font-size="10" font-weight="800" fill="#0e7490">JavaScript</text>

    <!-- Row 2 -->
    <rect x="24" y="184" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="42" cy="206" r="8" fill="#059669"/>
    <text x="58" y="203" class="f" font-size="12" font-weight="780" fill="#0f172a">Reviewer</text>
    <rect x="56" y="214" width="40" height="18" rx="9" fill="#d1fae5"/>
    <text x="61" y="227" class="m" font-size="10" font-weight="800" fill="#065f46">Rust</text>

    <text x="172" y="214" class="f" font-size="18" fill="#94a3b8">→</text>

    <rect x="188" y="184" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="206" cy="206" r="8" fill="#f59e0b"/>
    <text x="222" y="203" class="f" font-size="12" font-weight="780" fill="#0f172a">Tester</text>
    <rect x="220" y="214" width="38" height="18" rx="9" fill="#fef9c3"/>
    <text x="225" y="227" class="m" font-size="10" font-weight="800" fill="#92400e">C++</text>

    <!-- Description -->
    <rect x="24" y="256" width="308" height="80" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="42" y="284" class="f" font-size="14" fill="#334155">Preserves files, decisions, errors,</text>
    <text x="42" y="308" class="f" font-size="14" fill="#334155">review fixes, and next commands.</text>

    <!-- HandoffState protocol pill -->
    <rect x="24" y="352" width="308" height="36" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
    <text x="48" y="375" class="m" font-size="12" font-weight="700" fill="#1d4ed8">mode: hybrid_state · all 4 runtimes</text>

    <!-- Divider -->
    <line x1="24" y1="404" x2="332" y2="404" stroke="#f1f5f9" stroke-width="1.5"/>

    <!-- Metric pills: 3 in row, each 88px, gaps 8px → 3×88+2×8=280, starts x=24 ends x=304 ✓ -->
    <g transform="translate(24 420)">
      <rect width="88" height="30" rx="15" fill="#dbeafe"/>
      <text x="14" y="20" class="f" font-size="13" font-weight="800" fill="#1d4ed8">A score</text>
      <rect x="100" width="100" height="30" rx="15" fill="#dcfce7"/>
      <text x="116" y="20" class="f" font-size="13" font-weight="800" fill="#166534">3 handoffs</text>
      <rect x="212" width="64" height="30" rx="15" fill="#fef3c7"/>
      <text x="226" y="20" class="f" font-size="13" font-weight="800" fill="#92400e">replay</text>
    </g>

    <!-- Run command -->
    <text x="24" y="482" class="m" font-size="11" fill="#94a3b8">$ python examples/coding_review.py</text>
  </g>

  <!-- ── CARD 2: Support escalation ── -->
  <g transform="translate(444 208)" filter="url(#card)">
    <rect width="356" height="510" rx="24" fill="#ffffff" stroke="#e2eaf4" stroke-width="1.2"/>
    <rect width="356" height="7" rx="3.5" fill="url(#g2)"/>

    <text x="24" y="50" class="f" font-size="22" font-weight="820" fill="#0f172a">Support escalation</text>
    <text x="24" y="72" class="f" font-size="13" fill="#42526b">Triage, billing, refund, and supervisor</text>
    <text x="24" y="90" class="f" font-size="13" fill="#42526b">keep policy evidence attached.</text>

    <line x1="24" y1="106" x2="332" y2="106" stroke="#f1f5f9" stroke-width="1.5"/>

    <!-- Row 1 -->
    <rect x="24" y="118" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="42" cy="140" r="8" fill="#be123c"/>
    <text x="58" y="137" class="f" font-size="12" font-weight="780" fill="#0f172a">Triage</text>
    <rect x="56" y="148" width="52" height="18" rx="9" fill="#dbeafe"/>
    <text x="62" y="161" class="m" font-size="10" font-weight="800" fill="#1d4ed8">Python</text>

    <text x="172" y="148" class="f" font-size="18" fill="#94a3b8">→</text>

    <rect x="188" y="118" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="206" cy="140" r="8" fill="#f59e0b"/>
    <text x="222" y="137" class="f" font-size="12" font-weight="780" fill="#0f172a">Billing</text>
    <rect x="220" y="148" width="70" height="18" rx="9" fill="#cffafe"/>
    <text x="226" y="161" class="m" font-size="10" font-weight="800" fill="#0e7490">JavaScript</text>

    <!-- Row 2 -->
    <rect x="24" y="184" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="42" cy="206" r="8" fill="#ea580c"/>
    <text x="58" y="203" class="f" font-size="12" font-weight="780" fill="#0f172a">Refund</text>
    <rect x="56" y="214" width="40" height="18" rx="9" fill="#ffedd5"/>
    <text x="61" y="227" class="m" font-size="10" font-weight="800" fill="#9a3412">Rust</text>

    <text x="172" y="214" class="f" font-size="18" fill="#94a3b8">→</text>

    <rect x="188" y="184" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="206" cy="206" r="8" fill="#0f766e"/>
    <text x="222" y="203" class="f" font-size="12" font-weight="780" fill="#0f172a">Supervisor</text>
    <rect x="220" y="214" width="38" height="18" rx="9" fill="#fef9c3"/>
    <text x="225" y="227" class="m" font-size="10" font-weight="800" fill="#92400e">C++</text>

    <rect x="24" y="256" width="308" height="80" rx="16" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="42" y="284" class="f" font-size="14" fill="#334155">Keeps charge IDs, policy checks,</text>
    <text x="42" y="308" class="f" font-size="14" fill="#334155">refund reasons, and approvals.</text>

    <rect x="24" y="352" width="308" height="36" rx="18" fill="#fff7ed" stroke="#fde68a" stroke-width="1"/>
    <text x="48" y="375" class="m" font-size="12" font-weight="700" fill="#92400e">mode: compressed_state · audit trail</text>

    <line x1="24" y1="404" x2="332" y2="404" stroke="#f1f5f9" stroke-width="1.5"/>

    <g transform="translate(24 420)">
      <rect width="88" height="30" rx="15" fill="#ccfbf1"/>
      <text x="12" y="20" class="f" font-size="13" font-weight="800" fill="#0f766e">0.925</text>
      <rect x="100" width="100" height="30" rx="15" fill="#dcfce7"/>
      <text x="116" y="20" class="f" font-size="13" font-weight="800" fill="#166534">3 handoffs</text>
      <rect x="212" width="64" height="30" rx="15" fill="#ffedd5"/>
      <text x="224" y="20" class="f" font-size="13" font-weight="800" fill="#9a3412">audit</text>
    </g>

    <text x="24" y="482" class="m" font-size="11" fill="#94a3b8">$ python examples/support_escalation.py</text>
  </g>

  <!-- ── CARD 3: Research workflow (x=820, w=356 → right=1176) ── -->
  <g transform="translate(820 208)" filter="url(#card)">
    <rect width="356" height="510" rx="24" fill="#ffffff" stroke="#e2eaf4" stroke-width="1.2"/>
    <rect width="356" height="7" rx="3.5" fill="url(#g3)"/>

    <text x="24" y="50" class="f" font-size="22" font-weight="820" fill="#0f172a">Research workflow</text>
    <text x="24" y="72" class="f" font-size="13" fill="#42526b">Researcher, extractor, fact-checker,</text>
    <text x="24" y="90" class="f" font-size="13" fill="#42526b">and writer preserve source context.</text>

    <line x1="24" y1="106" x2="332" y2="106" stroke="#f1f5f9" stroke-width="1.5"/>

    <!-- Row 1 -->
    <rect x="24" y="118" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="42" cy="140" r="8" fill="#7c3aed"/>
    <text x="58" y="137" class="f" font-size="12" font-weight="780" fill="#0f172a">Researcher</text>
    <rect x="56" y="148" width="52" height="18" rx="9" fill="#dbeafe"/>
    <text x="62" y="161" class="m" font-size="10" font-weight="800" fill="#1d4ed8">Python</text>

    <text x="172" y="148" class="f" font-size="18" fill="#94a3b8">→</text>

    <rect x="188" y="118" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="206" cy="140" r="8" fill="#2563eb"/>
    <text x="222" y="137" class="f" font-size="12" font-weight="780" fill="#0f172a">Extractor</text>
    <rect x="220" y="148" width="70" height="18" rx="9" fill="#cffafe"/>
    <text x="226" y="161" class="m" font-size="10" font-weight="800" fill="#0e7490">JavaScript</text>

    <!-- Row 2 -->
    <rect x="24" y="184" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="42" cy="206" r="8" fill="#0891b2"/>
    <text x="58" y="203" class="f" font-size="12" font-weight="780" fill="#0f172a">Fact-checker</text>
    <rect x="56" y="214" width="40" height="18" rx="9" fill="#ffedd5"/>
    <text x="61" y="227" class="m" font-size="10" font-weight="800" fill="#9a3412">Rust</text>

    <text x="172" y="214" class="f" font-size="18" fill="#94a3b8">→</text>

    <rect x="188" y="184" width="144" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="206" cy="206" r="8" fill="#0f766e"/>
    <text x="222" y="203" class="f" font-size="12" font-weight="780" fill="#0f172a">Writer</text>
    <rect x="220" y="214" width="38" height="18" rx="9" fill="#fef9c3"/>
    <text x="225" y="227" class="m" font-size="10" font-weight="800" fill="#92400e">C++</text>

    <rect x="24" y="256" width="308" height="80" rx="16" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="42" y="284" class="f" font-size="14" fill="#334155">Tracks sources, claims, confidence,</text>
    <text x="42" y="308" class="f" font-size="14" fill="#334155">corrections, and citations.</text>

    <rect x="24" y="352" width="308" height="36" rx="18" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="48" y="375" class="m" font-size="12" font-weight="700" fill="#6d28d9">mode: natural_handoff · sources</text>

    <line x1="24" y1="404" x2="332" y2="404" stroke="#f1f5f9" stroke-width="1.5"/>

    <g transform="translate(24 420)">
      <rect width="88" height="30" rx="15" fill="#e0e7ff"/>
      <text x="12" y="20" class="f" font-size="13" font-weight="800" fill="#3730a3">0.912</text>
      <rect x="100" width="100" height="30" rx="15" fill="#dcfce7"/>
      <text x="116" y="20" class="f" font-size="13" font-weight="800" fill="#166534">3 handoffs</text>
      <rect x="212" width="64" height="30" rx="15" fill="#fef3c7"/>
      <text x="220" y="20" class="f" font-size="13" font-weight="800" fill="#92400e">sources</text>
    </g>

    <text x="24" y="482" class="m" font-size="11" fill="#94a3b8">$ python examples/research_workflow.py</text>
  </g>

  <!-- ── Bottom terminal bar: x=68 w=1144 → right=1212. margin=68 ✓ ── -->
  <g transform="translate(68 736)" filter="url(#term)">
    <rect width="1144" height="26" rx="13" fill="#0f1220"/>
    <circle cx="20" cy="13" r="4" fill="#fb7185"/>
    <circle cx="34" cy="13" r="4" fill="#facc15"/>
    <circle cx="48" cy="13" r="4" fill="#4ade80"/>
    <text x="68" y="18" class="m" font-size="11" fill="#475569">install:</text>
    <text x="128" y="18" class="m" font-size="11" font-weight="700" fill="#38bdf8">pip install handoffkit</text>
    <text x="338" y="18" class="m" font-size="11" font-weight="700" fill="#facc15">npm i @handoffkit/core</text>
    <text x="530" y="18" class="m" font-size="11" font-weight="700" fill="#fb923c">cargo add handoffkit</text>
    <text x="710" y="18" class="m" font-size="11" font-weight="700" fill="#a78bfa">cmake FetchContent (C++)</text>
    <text x="930" y="18" class="m" font-size="11" fill="#334155">· replay · validation · quality scoring</text>
  </g>
</svg>
