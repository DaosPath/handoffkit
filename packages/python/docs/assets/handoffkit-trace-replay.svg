<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HandoffKit trace and replay</title>
  <desc id="desc">A trace and replay pipeline showing RunTrace, FileTraceStore, ReplayRunner, and report output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="pipe" x1="128" y1="226" x2="1070" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <style>
      .heading { font: 800 38px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .sub { font: 500 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #CBD5E1; letter-spacing: 0; }
      .label { font: 800 23px Inter, ui-sans-serif, system-ui, sans-serif; fill: #F8FAFC; letter-spacing: 0; }
      .body { font: 500 16px Inter, ui-sans-serif, system-ui, sans-serif; fill: #CBD5E1; letter-spacing: 0; }
      .mono { font: 700 14px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #BAE6FD; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="417" rx="28.5" stroke="#334155" stroke-width="3"/>

  <text x="70" y="76" class="heading">Trace once. Replay safely.</text>
  <text x="70" y="110" class="sub">Replay reads evidence. It does not call providers, tools, or shell commands.</text>

  <path d="M178 226H1024" stroke="url(#pipe)" stroke-width="8" stroke-linecap="round"/>

  <g>
    <rect x="86" y="164" width="210" height="142" rx="24" fill="#0F172A" stroke="#38BDF8" stroke-width="2"/>
    <rect x="126" y="130" width="130" height="48" rx="16" fill="#0B1220" stroke="#38BDF8" stroke-width="2"/>
    <text x="154" y="160" class="mono">01</text>
    <text x="130" y="214" class="label">RunTrace</text>
    <text x="124" y="248" class="body">steps, handoffs,</text>
    <text x="136" y="273" class="body">tool results</text>
  </g>

  <g>
    <rect x="366" y="164" width="210" height="142" rx="24" fill="#0F172A" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="406" y="130" width="130" height="48" rx="16" fill="#0B1220" stroke="#8B5CF6" stroke-width="2"/>
    <text x="434" y="160" class="mono">02</text>
    <text x="398" y="214" class="label">TraceStore</text>
    <text x="419" y="248" class="mono">traces/*.json</text>
    <text x="414" y="273" class="body">durable audit</text>
  </g>

  <g>
    <rect x="646" y="164" width="210" height="142" rx="24" fill="#0F172A" stroke="#22C55E" stroke-width="2"/>
    <rect x="686" y="130" width="130" height="48" rx="16" fill="#0B1220" stroke="#22C55E" stroke-width="2"/>
    <text x="714" y="160" class="mono">03</text>
    <text x="684" y="214" class="label">Replay</text>
    <text x="695" y="248" class="body">inspect only</text>
    <text x="690" y="273" class="body">zero side effects</text>
  </g>

  <g>
    <rect x="926" y="164" width="188" height="142" rx="24" fill="#0F172A" stroke="#64748B" stroke-width="2"/>
    <rect x="960" y="130" width="120" height="48" rx="16" fill="#0B1220" stroke="#64748B" stroke-width="2"/>
    <text x="1000" y="160" class="mono">04</text>
    <text x="971" y="214" class="label">Reports</text>
    <text x="984" y="248" class="mono">JSON</text>
    <text x="967" y="273" class="mono">Markdown</text>
  </g>

  <path d="M306 226H354" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  <path d="M342 214L356 226L342 238" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M586 226H634" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  <path d="M622 214L636 226L622 238" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M866 226H914" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  <path d="M902 214L916 226L902 238" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="70" y="340" width="1060" height="46" rx="18" fill="#020617" stroke="#1E293B"/>
  <text x="96" y="369" class="mono">ReplaySummary = step_count + handoff_count + tool_result_count + final_output</text>
</svg>
